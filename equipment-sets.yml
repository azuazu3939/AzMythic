Diagram:
  Enabled: true # Will default to true if not set
  Bonuses:
  - Pieces: 1
    Skills:
    - skill{s=Azuriter_Item_Armor_Andis_Use} @self ~onKill
    - skill{s=Azuriter_Item_Armor_Andis_Use} @self ~onDamaged
    - skill{s=Azuriter_Item_Armor_Andis_Use} @self ~onSwing
    - skill{s=Azuriter_Item_Armor_Diagram_Use}@self ~onAttack
  - Pieces: 4
    Skills:
    - skill{s=Azuriter_Item_Armor_Diagram_Full} @self ~onKill
    - skill{s=Azuriter_Item_Armor_Diagram_Full} @self ~onDamaged
    - skill{s=Azuriter_Item_Armor_Diagram_Full} @self ~onSwing
    - skill{s=Azuriter_Item_Armor_Diagram_Full} @self ~onAttack

