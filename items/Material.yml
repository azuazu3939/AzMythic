### 敵視

Azuriter_アンガスタ:
  Id: blaze_powder
  Display: "&e&lアンガスタ"
  Lore:
  - "&f食べることで、周囲からの敵視を少し上げる"
  ItemUpdater:
    Version: 1
  Options:
    Glint: true
  Hide:
  - ENCHANTS
  Group: 'Material'
  Consumable:
    ConsumeSeconds: 2
    HasParticles: false
    Animation: EAT
    Sound: entity.blaze.ambient
    #ConsumeEffects: []
  Skills:
  - skill{
    s=[
      - setMaterialCooldown{m=blaze_powder;d=2400}
      - sudoskill{
        s=[
          - threat{m=ADD;a=1} @trigger 
        ];cat=true} @EIR{r=48;limit=16;sort=NEAREST;ignore=players}
    ];repeat=19;repeati=100;cd=120} @self ~onConsume 


