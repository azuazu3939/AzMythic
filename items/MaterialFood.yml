Azuriter_高揚の灯:
  Id: campfire
  Display: "&e&l高揚の灯"
  Lore:
  - "&f消費することで、30秒間クリティカル率を15%上昇させる。"
  ItemUpdater:
    Version: 1
  Group: 'Food'
  Options:
    Glint: true
    StackSize: 8
  Hide:
  - ENCHANTS
  Consumable:
    ConsumeSeconds: 1
    HasParticles: false
    Animation: EAT
    Sound: block.trial_spawner.about_to_spawn_item
  Skills:
  - skill{
    s=[
      - setMaterialCooldown{m=CAMPFIRE;d=180} @self
      - stataura{n=Azuriter_Item_Aura_HighSpirits;d=600;stat=CRITICAL_STRIKE_CHANCE;type=ADDITIVE;val=0.15} @self
    ]} @self ~onConsume ?!materialIsOnCooldown{m=CAMPFIRE}

