Azuriter_カーブショットボウ:
  Id: bow
  Display: "&aカーブショットボウ"
  Options:
    Unbreakable: true
  Lore:
    Template: ItemInfoLore_RangeCurve_1
  ItemUpdater:
    Version: 4
  Attributes:
    MainHand:
      Damage: 28 ADD
      Armor: -0.25 MULTIPLY_BASE
      ArmorToughness: -0.25 MULTIPLY_BASE
      Health: -0.2 MULTIPLY_BASE
      MovementSpeed: 0.4 MULTIPLY_BASE
      AttackSpeed: 0.5 MULTIPLY_BASE
  Group: 'Range-Weapon'
  Hide:
  - ENCHANTS
  Skills:
  - skill{s=Azuriter_Item_Weapon_Ranged_CurveShotBow_Use} @self ~onUse
  - skill{s=Azuriter_Item_Weapon_Ranged_CurveShotBow_Use} @self ~onInteract ?!crouching
  - cancelEvent{sync=true} @self ~onUse
  AugmentationSlots:
  - Type: Gem_1
    Amount: 1
    Chance: 1
    MaxAmount: 3


