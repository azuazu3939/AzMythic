Azuriter_Weapon_シューティングレーザー:
  Id: Enchanted_book
  Display: "&dシューティングレーザー"
  Lore:
    Template: ItemInfoLore_Normal_1
  ItemUpdater:
    Version: 1
  Attributes:
    MainHand:
      Damage: 16 ADD
      MovementSpeed: -0.25 MULTIPLY_BASE
  Group: 'Range-Weapon'
  Hide:
  - ENCHANTS
  AugmentationSlots:
  - Type: GEM
    Amount: 1to3
    Chance: 0.6
    MaxAmount: 3
  Skills:
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Use} @self ~onUse
  - modifyMana{a=10;m=give;cd=0.1} @self ~onKill 
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Kill} @self ~onKill 
  - skill{s=[
    - removetag{t=ShootingLaser1} @self
    - removetag{t=ShootingLaser2} @self
    - removetag{t=ShootingLaser3} @self
    - setVar{k=caster.ShootingStar;t=INTEGER;a="0"} @self
    ]} @self ~onSwing ?crouching ?onGround

