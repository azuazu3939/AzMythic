Azuriter_Boss_Feldos:
  Template: Azuriter_Enemy_RaidBoss_Base
  Display: "<#c20a0a>&l焔獣フェルドス&R"
  Type: hoglin
  Health: 47500
  Armor: 130
  Damage: 36
  Drops:
  - money 30to50 1
  Options:
    Silent: true
    Scale: 3
    MovementSpeed: 0.25
    KnockbackResistance: 1
    MaxCombatDistance: 32
    FollowRange: 10
    Adult: true
    ImmuneToZombification: true
  DamageModifiers:
  - SUFFOCATION 0
  - FALL 0
  AITargetSelectors:
  - clear
  - nearestIf{c=[ - hasAura{n=Azuriter_Core_Aura_NoCombat} false - samefaction false ]}
  AIGoalSelectors:
  - clear
  - randomstroll
  - gotoowner
  - MoveTowardsTargetConditional{
    s=1;maxrange=32;
    targetConditions=[
      - isPlayer true
      - distanceFromTL{d=64} true
    ]}
  - goToSpawn{speed=2;max=80;min=1}
