# グラキエス周辺の通常敵。

Azuriter_Frostfang:
  Template: Azuriter_Enemy_F1Base
  Type: wolf
  Display: "&fフロストファング"
  Health: 120
  Damage: 24
  Drops:
  - money 4to7 0.75
  AITargetSelectors:
  - clear
  - fleeConditional{distance=24;speed=1.1;safespeed=1;conditions=[ - mobsInRadius{r=25;a=>0;t=Azuriter_Boss_Glacies} true ]}
  - attacker
  AIGoalSelectors:
  - clear
  - meleeAttack
  - nothing{c=[ - samefaction true ]}
  Options:
    MaxCombatDistance: 48
    FollowRange: 8
    Scale: 1.35
    KnockbackResistance: 0.65
    MovementSpeed: 0.24
    AttackSpeed: 20
    NoDamageTicks: 0
  Skills:
  - attribute{attribute=FOLLOW_RANGE;a=48} @self ~onEnterCombat
  - attribute{attribute=FOLLOW_RANGE;a=8} @self ~onDropcombat
  - cmd{c="mlgo <target.name> Azuriter_パラライズワールド 1 0.0001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlgo <target.name> Azuriter_ハイステップソード 1 0.0001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlgo <target.name> Azuriter_Glacies_Summon_Paper 1 0.08"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlgo <target.name> Azuriter_ハイソール 1 0.15"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlgo <target.name> Azuriter_白マテリア 1 0.08"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlgo <target.name> Azuriter_CombatGift_G1 1 0.005"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlgo <target.name> Azuriter_Forge_Alloy_PrismarineCore 1 0.015"} @ThreatTablePlayers ~onDeath
  - attribute{attr=ARMOR_TOUGHNESS;a=55} @self ~onSpawn
  - attribute{attr=ARMOR;a=45} @self ~onSpawn ?!day
  - attribute{attr=ARMOR;a=30} @self ~onSpawn ?day
  - potion{t=STRENGTH;d=99999999;l=0} @self ~onSpawn ?!day
  - potion{t=SPEED;d=99999999;l=1} @self ~onSpawn
  - skill{s=Azuriter_Mob_Common_Frostfang_Loop} @self ~onEntercombat

  - classexp{a=<random.4to8>} @TTP ~onDeath

