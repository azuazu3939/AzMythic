Azuriter_Neutral_Zombie:
  Template: Azuriter_Enemy_F1Base
  Display: "&fゾンビ"
  Health: 20
  Damage: 10
  Drops:
  - money 1to4 0.2
  AITargetSelectors:
  - clear
  - fleeConditional{distance=16;speed=1.1;safespeed=1;conditions=[ - mobsInRadius{r=20;a=>0;t=Azuriter_Big_Zombie,Azuriter_Elite_Zombie} true ]}
  - attacker
  AIGoalSelectors:
  - clear
  - meleeAttack 
  - nothing{c=[ - samefaction true ]}
  Options:
    MaxCombatDistance: 48
    FollowRange: 4
  Skills:
  - attribute{attribute=FOLLOW_RANGE;a=48} @self ~onEnterCombat
  - attribute{attribute=FOLLOW_RANGE;a=4} @self ~onDropcombat 
  - cmd{c="mlgo <target.name> Azuriter_パラライズワールド 1 0.0001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlgo <target.name> Azuriter_ハイステップソード 1 0.0001"} @ThreatTablePlayers ~onDeath 
  - cmd{c="mlgo <target.name> Azuriter_粗悪な装備片 <random.1to3> 0.4"} @ThreatTablePlayers ~onDeath 
  - cmd{c="mlgo <target.name> Azuriter_粗悪な装備片 <random.4to8> 0.05"} @ThreatTablePlayers ~onDeath 
  - cmd{c="mlgo <target.name> Azuriter_CombatGift_G1 1 0.005"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlgo <target.name> Azuriter_白マテリア 1 0.05"} @ThreatTablePlayers ~onDeath ?!day
  - attribute{attr=ARMOR_TOUGHNESS;a=10} @self ~onSpawn 
  - attribute{attr=ARMOR;a=20} @self ~onSpawn ?!day
  - attribute{attr=ARMOR;a=10} @self ~onSpawn ?day  
  - skill{s=Azuriter_DayMaterial_NoDay} @self ~onSpawn 0.1
  - skill{s=Azuriter_DayMaterial_NoDay_Drop} @self ~onDeath 
  - potion{t=STRENGTH;d=99999999;l=0} @self ~onSpawn ?!day
  - potion{t=SPEED;d=99999999;l=0} @self ~onSpawn ?!day
  - sudo{
    s=[
      - signal{s=trial_drop_1} @MIR{r=32;t=Azuriter_トライアル_1_1}
    ];cd=2} @trigger ~onDeath 
  - skill{s=Azuriter_Neutral_Zombie_Summon} @self ~onDeath 0.015
  
  - classexp{a=1} @TTP ~onDeath 

