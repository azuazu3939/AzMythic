  - cmd{c="mlgo <target.name> Azuriter_Feldos_Summon_Paper 1 0.025"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlgo <target.name> Azuriter_Wedler_Summon_Paper 1 0.02"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlgo <target.name> Azuriter_Utility_FrontierThread 1 0.08"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlgo <target.name> Azuriter_Utility_HarvestTonic 1 0.025"} @ThreatTablePlayers ~onDeath
