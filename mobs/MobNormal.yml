  - cmd{c="mlgo <target.name> Azuriter_Surface_Fiber 1 0.1"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlgo <target.name> Azuriter_白マテリア 1 0.05"} @ThreatTablePlayers ~onDeath ?!day
  - attribute{attr=ARMOR_TOUGHNESS;a=10} @self ~onSpawn
  - attribute{attr=ARMOR;a=20} @self ~onSpawn ?!day
  - attribute{attr=ARMOR;a=10} @self ~onSpawn ?day
