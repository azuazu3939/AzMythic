#####モブスキル用#####

Azuriter_Soul_Wanderer_Soul1:
  Template: Azuriter_Enemy_Base
  Display: "[&d&l★&f×1] &9&lソール・ワンダラー"
  Health: 999999999
  Damage: 20
  DamageModifiers:
  - FALL 0
  Packet:
    Mode: disguise
    Disguise:
      Kind: BLOCK_DISPLAY
      Material: SOUL_FIRE
    Transform:
      Translation: 0,0,0
      Scale: 1,1,1
      LeftRotation: 0,0,0,1
      RightRotation: 0,0,0,1
      Billboard: FIXED
      Brightness: 15,15
      ShadowRadius: 0.0
      ShadowStrength: 1.0
      ViewRange: 1.0
  Options:
    MaxCombatDistance: 0
    PassthroughDamage: false
    LockPitch: true
    Scale: 0.5
    NoAI: true
    Interactable: false
    Silent: true
  Skills:
  - skill{
    s=[
      - teleport @selfLocation{y=-3.0}
      - tracklocation{delay=1} @selfLocation 
      - sound{s=entity.blaze.ambient;sc=PLAYERS;v=2;audience=@PIR{r=32}} @self
      - e:p{p=cloud;a=15;hs=1;s=1;audience=@PIR{r=32};vd=32} @self
      - look{f=true;delay=1} @parent 
      - delay 200
      - remove @self
    ]} @self ~onSpawn

