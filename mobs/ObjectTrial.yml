Azuriter_トライアル_1_1:
  Template: Azuriter_Enemy_Trial_Base
  DisplayOptions:
    Text: "[&6&l★&f×1] &f&lゾンビを&a&l30体&f&l倒す"
  Skills:
  - skill{
    s=[
      - setVar{k=caster.count;a="<caster.var.count|0> + 1";t=INTEGER} @self
      - barSet{name="<caster.uuid>";display="[&6&l★&f×1] &f&lゾンビを&a&l30体&f&l倒す &r- &b&l進行度";value="min(1.0, <caster.var.count|0> / 30.0)";color=GREEN;style=SEGMENTED_10} @self
      - sound{s=block.note_block.pling;v=2} @self

      - skill{
        s=[
          - barRemove{name="<caster.uuid>"} 
          - sound{s=entity.player.levelup;p=2;v=2}
          - skill{s=Azuriter_トライアル_1_Drop1}
          - suicide

        ]} @self ?!varrange{k=caster.count;r=<30}
      
      - aura{n=トライアル1;rd=true;t=600} @trigger ?!varrange{k=caster.count;r=>29} 

    ]} @self ~onSignal:trial_drop_1 
  - barCreate{name="<caster.uuid>";display="[&6&l★&f×1] &f&lゾンビを&a&l30体&f&l倒す &r- &b&l進行度";value="0.0";color=GREEN;style=SEGMENTED_10;delay=1} @self ~onSpawn 

