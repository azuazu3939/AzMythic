Azuriter_トライアル_5_1:
  Template: Azuriter_Enemy_Trial_Base
  Display: "[&d&l★&f×5] &c&lマスターゾンビ&f&lを1体倒す"
  DisplayOptions:
    Text: "[&d&l★&f×5] &c&lマスターゾンビ&f&lを1体倒す"
  Skills:
  - skill{
    s=[
      - barCreate{name="<caster.uuid>";display="[&d&l★&f×5] &c&lマスターゾンビ&f&lを1体倒す &r- &b&l進行度";value="0.0";color=GREEN;style=SEGMENTED_10;delay=1}
      - summon{a=1;s=true;r=0;m=Azuriter_Boss_マスターゾンビ;pitch=0;
        then=[
          - e:p{p=explosion_huge;a=1} @origin
          - sound{s=entity.lightning_bolt.impact;v=4} @origin
          ];delay=40}

    ]} @self ~onSpawn  
  
  - skill{
    s=[
      - skill{s=Azuriter_トライアル_5_Drop1}
      - barRemove{name="<caster.uuid>"}
      - suicide
    ]} @self ~onSignal:trial_drop_5

  - skill{
    s=[
      - setVar{k=skill.hp;a="(min(<target.hp> / <target.mhp>, 1.0))";t=FLOAT} @MIR{r=48;t=Azuriter_Boss_マスターゾンビ;limit=1;sort=NEAREST}
      - barSet{name="<caster.uuid>";display="[&d&l★&f×5] &c&lマスターゾンビ&f&lを1体倒す &r- &b&l進行度";value="1.0 - <skill.var.hp|1.0>";color=GREEN;style=SEGMENTED_10} @self
    ]}  @self ~onTimer:20 

