  Damage: 15
  DamageModifiers:
  - FALL 0
  Packet:
    Mode: disguise
    Disguise:
      Kind: BLOCK_DISPLAY
      Material: SOUL_FIRE
    Transform:
      Translation: 0,0,0
      Scale: 3,3,3
      LeftRotation: 0,0,0,1
      RightRotation: 0,0,0,1
      Billboard: FIXED
      Brightness: 15,15
      ShadowRadius: 0.0
      ShadowStrength: 1.0
      ViewRange: 1.0
  Drops:
  - money 30to60 1
  AITargetSelectors:
  - clear
  - nearestIf{c=[ - hasAura{n=Azuriter_Core_Aura_NoCombat} false - samefaction false ]}
  Options:
    MaxCombatDistance: 32
