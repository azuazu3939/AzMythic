  - aura{n=Azuriter_Mob_Aura_Trial1BossClear;rd=true;t=600} @trigger ~onDamaged ?~isplayer

  - attribute{attr=ARMOR;a=50} @self ~onSpawn ?!day
  - attribute{attr=ARMOR;a=30} @self ~onSpawn ?day
  - potion{t=SPEED;d=200;l=0} @self ~onSpawn ?!day

