Azuriter_Boss_マスターゾンビ:
  Template: Azuriter_Enemy_RaidBoss_Base
  Display: "[&d&l★&f×5] &c&lマスターゾンビ"
  Health: 40000
  Damage: 55
  DamageModifiers:
  - FALL 0
  Equipment:
  - DIAMOND_SWORD HAND
  - SHIELD OFFHAND
  - DIAMOND_HELMET HEAD
  - DIAMOND_CHESTPLATE CHEST
  - DIAMOND_LEGGINGS LEGS
  - DIAMOND_BOOTS FEET
  Drops:
  - money 50to150 1
  AITargetSelectors:
  - clear
  - nearestIf{c=[ - hasAura{n=Azuriter_Core_Aura_NoCombat} false - samefaction false ]}
  Options:
    MaxCombatDistance: 32
    FollowRange: 4
    KnockbackResistance: 1
    MovementSpeed: 0.25
    Scale: 1.5
    Despawn: CHUNK
  Skills:
  - tracklocation @casterSpawnLocation ~onSpawn

  - jump{v=0.8;delay=2} @self ~onSpawn
  - attribute{attribute=FOLLOW_RANGE;a=48} @self ~onEnterCombat
  - attribute{attribute=FOLLOW_RANGE;a=4} @self ~onDropcombat

  - setVar{k=caster.Azuriter_Core_Var_RaidBossSkill1;a="Azuriter_Mob_Boss_MasterZombie_Attack1";t=STRING} @self ~onSpawn
  - setVar{k=caster.Azuriter_Core_Var_RaidBossSkill2;a="Azuriter_Mob_Boss_MasterZombie_Attack2";t=STRING} @self ~onSpawn
  - setVar{k=caster.Azuriter_Core_Var_RaidBossSkill3;a="Azuriter_Mob_Boss_MasterZombie_Attack3";t=STRING} @self ~onSpawn
  - setVar{k=caster.Azuriter_Core_Var_RaidBossSkill4;a="Azuriter_Mob_Boss_MasterZombie_Attack4";t=STRING} @self ~onSpawn
  - setVar{k=caster.Azuriter_Core_Var_RaidBossSkill5;a="Azuriter_Mob_Boss_MasterZombie_Attack5";t=STRING} @self ~onSpawn
  - skill{s=Azuriter_Mob_Boss_MasterZombie_Attack1} @self ~onSignal:raid_boss_skill1
  - skill{s=Azuriter_Mob_Boss_MasterZombie_Attack2} @self ~onSignal:raid_boss_skill2
  - skill{s=Azuriter_Mob_Boss_MasterZombie_Attack3} @self ~onSignal:raid_boss_skill3
  - skill{s=Azuriter_Mob_Boss_MasterZombie_Attack4} @self ~onSignal:raid_boss_skill4
  - skill{s=Azuriter_Mob_Boss_MasterZombie_Attack5} @self ~onSignal:raid_boss_skill5
  - message{m="<trigger.name>が、Azuriter_Mob_Boss_MasterZombie_Attack1を<caster.name>に実行させた。"} @PIR{r=32} ~onSignal:raid_boss_skill1
  - message{m="<trigger.name>が、Azuriter_Mob_Boss_MasterZombie_Attack2を<caster.name>に実行させた。"} @PIR{r=32} ~onSignal:raid_boss_skill2
  - message{m="<trigger.name>が、Azuriter_Mob_Boss_MasterZombie_Attack3を<caster.name>に実行させた。"} @PIR{r=32} ~onSignal:raid_boss_skill3
  - message{m="<trigger.name>が、Azuriter_Mob_Boss_MasterZombie_Attack4を<caster.name>に実行させた。"} @PIR{r=32} ~onSignal:raid_boss_skill4
  - message{m="<trigger.name>が、Azuriter_Mob_Boss_MasterZombie_Attack5を<caster.name>に実行させた。"} @PIR{r=32} ~onSignal:raid_boss_skill5

  - cmd{c="mlg <target.name> Azuriter_パラライズワールド 1 0.001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_ハイステップソード 1 0.001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_CombatGift_G1 <random.1to3> 1"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_ArmorGift_G1 1 0.25"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_ArmorGift_G2 1 0.05"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_CombatGift_G1 1 0.35"} @ThreatTablePlayers ~onDeath
  - summon{t=Azuriter_Armor_Zombie;a=2;r=5;s=true;delay=10} @self ~onEnterCombat
  - summon{t=Azuriter_ArmorFull_Zombie;a=1;r=6;s=true;delay=24} @self ~onEnterCombat
  - potion{t=STRENGTH;l=0;d=9999999;p=false;or=true} @self ~onDamaged <=60%

  - skill:Azuriter_Core_Enemy_EnterCombat{down_tick=100;shield_break=2000;heal_percent=0.01} @self ~onEnterCombat

  - attribute{attr=ARMOR_TOUGHNESS;a=140} @self ~onSpawn

  - attribute{attr=ARMOR;a=180} @self ~onSpawn ?!day
  - attribute{attr=ARMOR;a=140} @self ~onSpawn ?day
  - potion{t=SPEED;d=200;l=0} @self ~onSpawn ?!day

  - attribute{attr=ARMOR;a=180} @self ~onDamaged ?!day
  - attribute{attr=ARMOR;a=140} @self ~onDamaged ?day
  - potion{t=SPEED;d=200;l=0} @self ~onDamaged ?!day

  - aura{n=Azuriter_Mob_Aura_Trial5Clear;rd=true;t=600} @trigger ~onDamaged ?~isplayer

  - cmd{c="mlg <target.name> Azuriter_ウィクサーH 1 0.0125"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_ウィクサーC 1 0.0125"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_ウィクサーL 1 0.0125"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_ウィクサーB 1 0.0125"} @ThreatTablePlayers ~onDeath

  - cmd{c="mlg <target.name> Azuriter_Augment_守備のジェム_1 1 0.02"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_忍耐のジェム_1 1 0.02"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_体力のジェム_1 1 0.02"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_速度のジェム_1 1 0.02"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_回復のジェム_1 1 0.02"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_背水のジェム_1 1 0.02"}  @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_力のジェム_1 1 0.02"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_矢走のジェム_1 1 0.02"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_贄のジェム_1 1 0.02"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_会心のジェム_1 1 0.02"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_会心攻撃のジェム_1 1 0.02"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_戦棍のジェム_1 1 0.02"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_速攻のジェム_1 1 0.02"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_魔力のジェム_1 1 0.02"} @ThreatTablePlayers ~onDeath

  - skill{s=Azuriter_Mob_Boss_MasterZombie_Loop} @self ~onEntercombat
  - signal{s=trial_drop_5;cd=2} @parent ~onDeath

  - classexp{a=<random.450to550>} @TTP ~onDeath

Azuriter_Boss_ソール_ワンダラー:
