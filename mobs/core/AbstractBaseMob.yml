Azuriter_Enemy_Abstract_Generic:
  Type: zombie
  Display: ""
  Faction: monster
  Options:
    Collidable: true
    DigOutOfGround: true
    FollowRange: 8
    Despawn: true
    KnockbackResistance: 0
    NoDamageTicks: 0
    VisibleByDefault: true
    NoAI: false
    PreventOtherDrops: true
    PreventSlimeSplit: true
    NoGravity: false
    PreventMobKillDrops: true
    PreventRandomEquipment: true
    PreventVanillaDamage: true
    PreventSunburn: true
    PreventJockeyMounts: true
    PreventConversion: true
    PreventTransformation: true
    Invisible: false
    AttackSpeed: 1
    Scale: 1
    MovementSpeed: 0.2
    Silent: false
    UseThreatTable: true
  Skills:
  - remove{delay=15} @self ~onDeath
  - heal{a=<caster.mhp>;delay=1} @self ~onSpawn
  - heal{a=<caster.mhp>;delay=1;cd=1200} @self ~onEntercombat 

