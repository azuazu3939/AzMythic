Azuriter_Mob_Fedos:
  Template: Azuriter_Enemy_NormalBase
  Display: "<#ff8a5a>&lフェドス&R"
  Type: HOGLIN
  Health: 8000
  Armor: 82
  Damage: 50
  Drops:
  - money 160to360 1
  Options:
    Silent: true
    Scale: 2
    MovementSpeed: 0.215
    KnockbackResistance: 0.9
    MaxCombatDistance: 32
    FollowRange: 10
    Adult: true
    ImmuneToZombification: true
  DamageModifiers:
  - SUFFOCATION 0
  - FALL 0
  AITargetSelectors:
  - clear
  - nearestIf{c=[ - hasAura{n=Azuriter_Core_Aura_NoCombat} false - samefaction false ]}
  AIGoalSelectors:
  - clear
  - randomstroll
  - gotoowner
  - MoveTowardsTargetConditional{
    s=1;maxrange=32;
    targetConditions=[
      - isPlayer true
      - distanceFromTL{d=64} true
    ]}
  - goToSpawn{speed=2;max=80;min=1}
  - moveTowardsTarget
  - float
  BossBar:
    Enabled: true
    Title: <caster.name>
    Range: 32
    Color: WHITE
    Style: SOLID
  Skills:
  - attribute{attr=ARMOR_TOUGHNESS;a=82} @self ~onSpawn
  - removetag{t=Azuriter_Core_Tag_AttackBusy} @self ~onEntercombat
  - skill{s=Azuriter_Mob_Fedos_Loop} @self ~onEntercombat  
  - attribute{attribute=FOLLOW_RANGE;a=64} @self ~onEnterCombat
  - attribute{attribute=FOLLOW_RANGE;a=10;delay=5} @self ~onDropCombat

  - potionclear{t=STRENGTH} @self ~onDamaged >55%
  - potion{t=STRENGTH;l=0;d=9999999;p=false;or=true} @self ~onDamaged =55%

  - cmd{c="mlg <target.name> Azuriter_ハイステップソード 1 0.0001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_ピジャークリスタル 1 0.8"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_CombatGift_G1 1 0.15"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_城壁の守護石 1 0.05"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_獣の大骨 1 1"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_守備のジェム_1 1 0.001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_忍耐のジェム_1 1 0.001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_体力のジェム_1 1 0.001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_速度のジェム_1 1 0.001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_回復のジェム_1 1 0.001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_背水のジェム_1 1 0.001"}  @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_力のジェム_1 1 0.001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_矢走のジェム_1 1 0.001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_贄のジェム_1 1 0.001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_会心のジェム_1 1 0.001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_会心攻撃のジェム_1 1 0.001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_戦棍のジェム_1 1 0.001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_速攻のジェム_1 1 0.001"} @ThreatTablePlayers ~onDeath
  - cmd{c="mlg <target.name> Azuriter_Augment_魔力のジェム_1 1 0.001"} @ThreatTablePlayers ~onDeath

  - classexp{a=<random.120to200>} @TTP ~onDeath

