# 汎用敵ギミック群。
# ボスや試練で共有するダウン処理、ランキング処理、距離制御をここへ集約する。
#Usage
#<skill.shield_break>が高いほど、ダウンは遅い。
#@Param / INTEGER: <skill.down_tick> / INTEGER: <skill.shield_break> / FLOAT: <skill.heal_percent>
Azuriter_Core_Enemy_EnterCombat:
  Conditions:
  - incombat true
  - hasTag{t=Azuriter_Core_Tag_EnemyCycleStart} false
  - hasTag{t=Azuriter_Core_Tag_EnemyDown} castinstead Azuriter_Core_Enemy_EnterCombat_NextCycle
  Skills:
  - addtag{t=Azuriter_Core_Tag_EnemyCycleStart} @self
  - setVar{n=skill.point;a="8";t=INTEGER} @self
  - setVar{n=skill.multiple;a="10";t=INTEGER} @self
  - setVar{n=skill.shield_point;a="<skill.var.point> * <skill.var.multiple>";t=INTEGER} @self
  - setVar{n=skill.shield;a="0";t=INTEGER} @self
  - setVar{n=caster.Azuriter_Core_Var_DownCount;a="<caster.var.Azuriter_Core_Var_DownCount|0>";t=INTEGER} @self
  - setVar{n=skill.downTick;a="<skill.down_tick>";t=INTEGER} @self
  - meta:Azuriter_Core_Enemy_EnterCombat_DamageCount @self
  - delay 1
  - skill:Azuriter_Core_Enemy_EnterCombat_DamageAura{break=<skill.shield_break>} @self
  - skill:Azuriter_Core_Enemy_EnterCombat_InitShields @self
  - delay 1200
  - heal{a="<caster.mhp> * <skill.heal_percent>"} @self
  - removetag{t=Azuriter_Core_Tag_EnemyCycleStart} @self
  - skill:Azuriter_Core_Enemy_EnterCombat @self

#
Azuriter_Core_Enemy_EnterCombat_DamageCount:
  Skills:
  - setVar{k=caster.Azuriter_Core_Var_TargetCount;a="0";t=INTEGER} @self
  - sudoskill{
    s=[
      - setVar{k=target.Azuriter_Core_Var_TargetCount;a="<target.var.Azuriter_Core_Var_TargetCount|0> + 1";t=INTEGER} @trigger
    ];cat=true} @TTP

#
Azuriter_Core_Enemy_EnterCombat_DamageAura:
  Skills:
  - setVar{var=skill.dmg;val="0";t=FLOAT} @self
  - setVar{var=skill.break;val="<caster.mhp> * (1 + <caster.var.Azuriter_Core_Var_TargetCount> * 0.1) * <skill.break> / 10000 / 7 * (1 + <caster.var.Azuriter_Core_Var_DownCount> * 0.5)";t=FLOAT} @self
  - auraRemove{n=Azuriter_Core_Aura_EnemyDamageWindow} @self
  - ondamaged{auraName=Azuriter_Core_Aura_EnemyDamageWindow;d=1200;
      oh=[
        - setVar{var=skill.dmg;val="<skill.var.dmg> + <skill.var.damage-amount>";t=FLOAT} @self
        - setVar{var=skill.temp;val="<skill.var.break> - <skill.var.dmg>";t=FLOAT} @self
        - skill:Azuriter_Core_Enemy_EnterCombat_DamageBreak @self
      ]} @self

#
Azuriter_Core_Enemy_EnterCombat_DamageBreak:
  Conditions:
  - varrange{var=skill.temp;val=<0} true
  Skills:
  - setVar{var=skill.dmg;val="<skill.var.dmg> - <skill.var.break>";t=FLOAT} @self
  - auraRemove{n=Azuriter_Core_Aura_EnemyShieldNode_<skill.var.shield>} @self
  - auraRemove{n=Azuriter_Core_Aura_EnemyDamageWindow} ?varrange{k=skill.shield;r=7} #変更時追加入力必須
  - setVar{n=skill.shield;a="<skill.var.shield> + 1";t=INTEGER} @self
  - skill:Azuriter_Core_Enemy_Down @self

#
Azuriter_Core_Enemy_EnterCombat_InitShields:
  Skills:
  - setVar{n=skill.count;a="0";t=INTEGER} @self
  - skill:Azuriter_Core_Enemy_EnterCombat_InitShieldNode{repeat=<skill.var.point>;repeati=0} @self

#
Azuriter_Core_Enemy_EnterCombat_InitShieldNode:
  Skills:
  - setVar{n=skill.count_point;a="<skill.var.count> * <skill.var.multiple>";t=INTEGER} @self
  - auraRemove{n=Azuriter_Core_Aura_EnemyShieldNode_<skill.var.count>} @self
  - o{
      i=1;vr=0;hr=0;hp=false;hnp=false;mr=24;d=1200;r=3;oy=2;p=<skill.var.shield_point>;sp=<skill.var.count_point>;
      b=ITEM;mat=DIAMOND;enchanted=true;rd=true;
      auraName=Azuriter_Core_Aura_EnemyShieldNode_<skill.var.count>} @self
  - setVar{n=skill.count;a="<skill.var.count> + 1";t=INTEGER} @self

#
Azuriter_Core_Enemy_Down:
  Conditions:
  - hasAura{n=Azuriter_Core_Aura_EnemyShieldNode_7} false
  Skills:
  - addtag{t=Azuriter_Core_Tag_EnemyDown} @self
  - sound{s=item.shield.break;v=3;p=0} @self
  - potion{t=GLOWING;d=<skill.var.downTick>;l=0;or=true} @self
  - ondamaged{n=Azuriter_Core_Aura_EnemyDownDamage;damagemod="ENTITY_ATTACK 1.5";t=<skill.var.downTick>;i=1} @self
  - stun{t=<skill.var.downTick>;g=true} @self
  - delay <skill.var.downTick>
  - setVar{n=caster.Azuriter_Core_Var_DownCount;a="<caster.var.Azuriter_Core_Var_DownCount|0> + 1";t=INTEGER} @self
  - removetag{t=Azuriter_Core_Tag_EnemyDown} @self
  - removetag{t=Azuriter_Core_Tag_EnemyCycleStart} @self
  - sound{s=block.anvil.use;v=3;p=2} @self
  - skill:Azuriter_Core_Enemy_EnterCombat_NextCycle @self

#
Azuriter_Core_Enemy_EnterCombat_NextCycle:
  Skills:
  - delay 20
  - skill:Azuriter_Core_Enemy_EnterCombat @self

#@Param / FLOAT: <skill.var.dmg>
Azuriter_Core_Enemy_DamageBuff:
  Skills:
  - setVar{var=skill.dmg;val="<skill.var.dmg> * 1.05";t=FLOAT} @self ?hasAura{n=Azuriter_Core_Aura_EnemyShieldNode_0} #<skill.var.point>の数の分だけ生成する
  - setVar{var=skill.dmg;val="<skill.var.dmg> * 1.05";t=FLOAT} @self ?hasAura{n=Azuriter_Core_Aura_EnemyShieldNode_1}
  - setVar{var=skill.dmg;val="<skill.var.dmg> * 1.05";t=FLOAT} @self ?hasAura{n=Azuriter_Core_Aura_EnemyShieldNode_2}
  - setVar{var=skill.dmg;val="<skill.var.dmg> * 1.05";t=FLOAT} @self ?hasAura{n=Azuriter_Core_Aura_EnemyShieldNode_3}
  - setVar{var=skill.dmg;val="<skill.var.dmg> * 1.05";t=FLOAT} @self ?hasAura{n=Azuriter_Core_Aura_EnemyShieldNode_4}
  - setVar{var=skill.dmg;val="<skill.var.dmg> * 1.05";t=FLOAT} @self ?hasAura{n=Azuriter_Core_Aura_EnemyShieldNode_5}
  - setVar{var=skill.dmg;val="<skill.var.dmg> * 1.05";t=FLOAT} @self ?hasAura{n=Azuriter_Core_Aura_EnemyShieldNode_6}
  - setVar{var=skill.dmg;val="<skill.var.dmg> * 1.05";t=FLOAT} @self ?hasAura{n=Azuriter_Core_Aura_EnemyShieldNode_7}
  - setVar{var=skill.dmg;val="<skill.var.dmg> * 1.2";t=FLOAT} @self ?hasTag{t=Azuriter_Core_Tag_MidHealth}
  - setVar{var=skill.dmg;val="<skill.var.dmg> * 1.25";t=FLOAT} @self ?hasTag{t=Azuriter_Core_Tag_LowHealth}

#
Azuriter_Core_Enemy_Ranking_ShowEntry:
  Skills:
  - delay 0
  - setVar{k=skill.name;a=<skill.key>;t=STRING} @self
  - setVar{k=skill.sortDMG;a=<caster.var.rankMap.<skill.key>>;t=DOUBLE} @self
  - setVar{k=skill.size;a=<caster.var.rankMap.size>;t=INTEGER} @self
  - setVar{k=skill.value;a="0";t=STRING} @self
  - setVar{k=skill.sortRank;a=<caster.var.Azuriter_Core_Var_RankingSortList.sortnum.reverse.lastindexof.<skill.var.sortDMG>.add.1>;t=INTEGER} @self
  - setVar{k=skill.player;a=<target.name>;t=STRING} @UniqueIdentifier{u=<skill.key>} ?!varrange{k=skill.sortRank;r=>10}
  - message{m="&a&l<skill.var.sortRank>位 &6&l<skill.var.player> &f&lスコア &b<skill.var.sortDMG>"} @PIR{r=<skill.var.range>} ?varset{k=skill.player}
  - setVar{k=skill.reward;a="10 - <skill.var.sortRank>";t=INTEGER} @self ?varset{k=skill.player}
  - message{m="<skill.var.sortRank>"} @playerByName{n=<skill.var.player>} ?varset{k=skill.player}
  - vskill{s=<skill.var.do>;repeat=<skill.var.reward>;repeati=1} @playerByName{n=<skill.var.player>} ?varset{k=skill.player}

#
Azuriter_Core_Enemy_Ranking_PushValue:
  Skills:
  - addVar{k=caster.Azuriter_Core_Var_RankingSortList;a=<skill.value>} @self ?varset{k=caster.Azuriter_Core_Var_RankingSortList}
  - setVar{k=caster.Azuriter_Core_Var_RankingSortList;a=<skill.value>;t=LIST} @self ?!varset{k=caster.Azuriter_Core_Var_RankingSortList}

Azuriter_Core_Target_RandomPlayer:
  Conditions:
  - incombat true
  Skills:
  - setTarget @TTP{sort=RANDOM;limit=1} ?targets{a=>0}

#設定可能なパラメータ (s_name、s_repeat、s_repeat_i)
Azuriter_Core_Trigger_OnGround:
  Skills:
  - setVar{k=skill.name;a="<skill.s_name>";t=STRING} @self
  - setVar{k=skill.repeat_c;a="<skill.s_repeat>";t=STRING} @self
  - setVar{k=skill.repeat_i_c;a="<skill.s_repeat_i>";t=STRING} @self

  - setVar{k=skill.repeat;a="0";t=INTEGER} @self
  - setVar{k=skill.repeat_i;a="0";t=INTEGER} @self
  - setVar{k=skill.repeat;a="<skill.s_repeat>";t=INTEGER} @self ?!varequals{k=skill.repeat_c;v="[Undefined]"}
  - setVar{k=skill.repeat_i;a="<skill.s_repeat_i>";t=INTEGER} @self ?!varequals{k=skill.repeat_i_c;v="[Undefined]"}

  - skill{s=Azuriter_Core_Trigger_OnGround_Process} @self ?!varequals{k=skill.name;v="[Undefined]"}

Azuriter_Core_Trigger_OnGround_Process:
  Conditions:
  - onGround{onfail=castinstead Azuriter_Core_Trigger_OnGround_Wait}
  Skills:
  - vskill{s=<skill.var.name>;repeat=<skill.var.repeat>;repeati=<skill.var.repeat_i>} @self

Azuriter_Core_Trigger_OnGround_Wait:
  Skills:
  - delay 1
  - skill{s=Azuriter_Core_Trigger_OnGround_Process} @self

Azuriter_Core_RaidBoss_Control:
  Cooldown: 1
  Skills:
  - setVar{k=skill.repeat;a="19";t=INTEGER} @self
  - skill{s=Azuriter_Core_RaidBoss_Control_Repeat;repeat=<skill.var.repeat>;repeati=1} @self

Azuriter_Core_RaidBoss_Control_Repeat:
  Skills:
  - setVar{k=skill.<skill.var.itr>;a="<caster.var.Azuriter_Core_Var_RaidBossSkill<skill.var.itr>>";t=STRING} @self
  - skill{s=Azuriter_Core_RaidBoss_Control_Message;count=<skill.var.itr>} @trigger ?!varequals{k=skill.<skill.var.itr>;v="[Undefined]"} ?varset{k=caster.Azuriter_Core_Var_RaidBossSkill<skill.var.itr>}

Azuriter_Core_RaidBoss_Control_Message:
  Skills:
  - message{m=""}
  - setVar{k=skill.temp;a="<skill.var.<skill.count>>";t=STRING} @self
  - setVar{k=skill.msg;a="raid_boss_skill<skill.count>";t=STRING} @self
  - jsonmessage{m="[{'text':'&6<skill.count>. &fスキル &a<skill.var.temp> &fを実行する。','clickEvent':{'action':'run_command','value':'/mm signal <caster.uuid> <skill.var.msg>'}}]"}

Azuriter_Core_RaidBoss_IdleHeal:
  Skills:
  - heal{a=<caster.mhp>} @self ?!incombat

Azuriter_Core_Particle_Cloud:
  Skills:
  - setvar{var=skill.x;val="<random.float.-5to5>";t=FLOAT} @self
  - setvar{var=skill.y;val="<random.float.-5to5>";t=FLOAT} @self
  - setvar{var=skill.z;val="<random.float.-5to5>";t=FLOAT} @self
  - e:p{p=cloud;a=5;s=1;size=2;d=true;dr=true;origin=@origin{x=<skill.var.x>;y=<skill.var.y>;z=<skill.var.z>};fo=true} @origin{x=<skill.var.x>;y=<skill.var.y>;z=<skill.var.z>}

Azuriter_Core_Trial_Options:
  Cooldown: 0.5
  Skills:
  - sudoskill{s=Azuriter_Core_Trial_ChildHeal} @children ?children{a=>0}
  - sudoskill{s=Azuriter_Core_Trial_ChildRangeReset} @children ?children{a=>0}
  - skill{s=Azuriter_Core_Trial_DistanceCheck} @self ?children{a=>0}
  - skill{s=Azuriter_Core_Trial_DistanceReset} @self ?children{a=>0}

Azuriter_Core_Trial_ChildHeal:
  Skills:
  - heal{a="<caster.mhp> * 0.0005"} @self

Azuriter_Core_Trial_ChildRangeReset:
  Conditions:
  - distanceFromTL{d=>32}
  Skills:
  - heal{a="<caster.mhp> * 0.1"} @self
  - teleportto{c=@trackedLocation} @self

Azuriter_Core_Trial_DistanceCheck:
  Conditions:
  - playerNotWithin{d=32} orelsecast Azuriter_Core_Trial_DistanceCheck_Clear
  Skills:
  - aura{n=Azuriter_Core_Aura_TrialDistanceCheck;ms=11;rd=true;150;i=20} @self

Azuriter_Core_Trial_DistanceCheck_Clear:
  Skills:
  - removeaura{n=Azuriter_Core_Aura_TrialDistanceCheck} @self

Azuriter_Core_Trial_DistanceReset:
  Conditions:
  - hasAuraStacks{n=Azuriter_Core_Aura_TrialDistanceCheck;s=11}
  Skills:
  - sudoskill{s=Azuriter_Core_Trial_ResetChild} @children

Azuriter_Core_Trial_ResetChild:
  Skills:
  - heal{a="<caster.mhp> * 1"} @self
  - removetag{t=Azuriter_Core_Tag_TrialAction} @self
  - potionclear @self
