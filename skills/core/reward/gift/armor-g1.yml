Azuriter_Core_Gift_Armor_G1_BulkUse:
  Cooldown: 0.5
  Conditions:
  - wearing{s=HAND;i=Azuriter_ArmorGift_G1}
  Skills:
  - setVar{k=skill.repeatA;a="<item.amount>";t=INTEGER} @self
  - takeitem{a=<skill.var.repeatA>;i=Azuriter_ArmorGift_G1} @self
  - sound{s=block.note_block.pling;p=2;sc=PLAYERS;audience=caster} @self
  - sound{s=entity.firework_rocket.blast;sc=PLAYERS;audience=caster} @self
  - skill{s=Azuriter_Core_Gift_Armor_G1_Loot;repeat="<skill.var.repeatA> - 1";repeati=1} @self

  - setVar{k=skill.msg;a="1000 * <skill.var.repeatA>";t=INTEGER} @self
  - currencygive{amount="<skill.var.msg>"} @self
  - delay 80
  - am{m="&e<skill.var.msg>Mine &fを獲得しました。"}
