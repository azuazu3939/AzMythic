Azuriter_Core_Gift_Armor_G1_Use:
  Cooldown: 0.05
  Conditions:
  - wearing{s=HAND;i=Azuriter_ArmorGift_G1}
  Skills:
  - takeitem{a=1;i=Azuriter_ArmorGift_G1} @self
  - sound{s=block.note_block.pling;p=2;sc=PLAYERS;audience=caster} @self
  - sound{s=entity.firework_rocket.blast;sc=PLAYERS;audience=caster} @self
  - skill{s=Azuriter_Core_Gift_Armor_G1_Loot} @self

  - currencygive{amount=1000} @self
  - am{m="&e1000Mine &fを獲得しました。"}

