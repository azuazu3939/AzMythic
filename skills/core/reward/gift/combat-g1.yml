Azuriter_Core_Gift_Combat_G1_Use:
  Cooldown: 0.05
  Conditions:
  - wearing{s=HAND;i=Azuriter_CombatGift_G1}
  Skills:
  - takeitem{a=1;i=Azuriter_CombatGift_G1} @self
  - sound{s=block.note_block.pling;p=2;sc=PLAYERS;audience=caster} @self
  - sound{s=entity.firework_rocket.blast;sc=PLAYERS;audience=caster} @self
  - skill{s=Azuriter_Core_Gift_Combat_G1_Loot} @self

  - azmoneygive{amount="100";reason=combat_gift;label="&f戦闘Gift"} @self

Azuriter_Core_Gift_Combat_G1_Loot:
  Skills:
  - setVar{k=skill.get_chance;a="<random.1to64>";t=INTEGER} @self
  - cmd{c="mlg <caster.name> Azuriter_CombatGift_G1_Ticket <random.4to10> 1"} @self ?varrange{k=skill.get_chance;r=<11}
  - cmd{c="mlg <caster.name> Azuriter_ハイステップソード 1 0.05"} @self ?varrange{k=skill.get_chance;r=16}
  - cmd{c="mlg <caster.name> Azuriter_CombatGift_G1_Ticket <random.1to3> 1"} @self
  - cmd{c="mlg <caster.name> Azuriter_お肉 1 0.75"} @self
  - cmd{c="mlg <caster.name> Azuriter_パラライズワールド 1 0.01"} @self ?varrange{k=skill.get_chance;r=>60}
  - cmd{c="mlg <target.name> Azuriter_Augment_Remover_1 1 0.15"} @self
  - cmd{c="mlg <target.name> Azuriter_Augment_Remover_2 1 0.05"} @self
  - cmd{c="mlg <target.name> Azuriter_Augment_Unlocker_3 1 0.03"} @self
  - cmd{c="mlg <target.name> Azuriter_Augment_Unlocker_4 1 0.01"} @self
  - cmd{c="mlg <target.name> Azuriter_Augment_Unlocker_5 1 0.005"} @self

Azuriter_Core_Gift_Combat_G1_BulkUse:
  Cooldown: 0.5
  Conditions:
  - wearing{s=HAND;i=Azuriter_CombatGift_G1}
  Skills:
  - setVar{k=skill.repeatC;a="<item.amount>";t=INTEGER} @self
  - takeitem{a=<skill.var.repeatC>;i=Azuriter_CombatGift_G1} @self
  - sound{s=block.note_block.pling;p=2;sc=PLAYERS;audience=caster} @self
  - sound{s=entity.firework_rocket.blast;sc=PLAYERS;audience=caster} @self
  - skill{s=Azuriter_Core_Gift_Combat_G1_Loot;repeat="<skill.var.repeatC> - 1";repeati=1} @self

  - setVar{k=skill.msg;a="100 * <skill.var.repeatC>";t=INTEGER} @self
  - azmoneygive{amount="<skill.var.msg>";reason=combat_gift;label="&f戦闘Gift"} @self
