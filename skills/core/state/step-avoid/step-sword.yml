  - delay 15
  - missile{
    os=[
      - sound{s=block.trial_spawner.ominous_activate;p=2;v=0.3;audience=caster;sc=PLAYERS} @self
    ];
    ot=[
      - modifyProjectile{trait=INERTIA;action=MULTIPLY;value=0.5} @self
    ];
    oh=[
      - setVar{k=skill.damage;a="<skill.var.damageStepAvoid|0> + 40";t=FLOAT} @self
      - setVar{k=skill.damage;a="<skill.var.damage|0> / 2";t=FLOAT} @self ?!wearing{s=HAND;i=STONE_SWORD}
