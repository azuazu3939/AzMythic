      - sound{s=entity.zombie.attack_iron_door;v=0.5;audience=caster;sc=PLAYERS}
      - sound{s=entity.breeze.inhale;p=2;v=0.5;audience=caster;sc=PLAYERS}
    ];
    conditions=[
      - isLiving true

    ];
    bulletType=DISPLAY;mat=netherite_sword;scale=1.25,1.25,1.25;yaw=3.14;pitch=1.57;roll=0.785;
    v=32;i=1;hp=false;hnp=true;mr=32;se=true;d=200;
