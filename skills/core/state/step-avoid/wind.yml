Azuriter_Core_StepAvoid_WindCombo:
  Skills:
  - skill{s=Azuriter_Core_StepAvoid_WindCombo_Loop;repeat=2;repeati=8} @self

Azuriter_Core_StepAvoid_WindCombo_Loop:
  Skills:
  - mi{v=4;vo=3;vr=1.5;hr=1.5;i=1;in=18;hp=false;hnp=true;mr=24;d=100;syo=4.5;sfo=0;
    b=DISPLAY;mat=WOODEN_SWORD;scale=1.25,1.25,1.25;yaw=3.14;pitch=1.57;roll=0.785;
    ot=[
      - modifyprojectile{t=INERTIA;a=MULTIPLY;v=0.6} @self
      - modifyprojectile{t=VELOCITY;a=MULTIPLY;v=1.2} @self
    ];
    os=[
      - sound{s=block.trial_spawner.ominous_activate;p=2;v=0.25;sc=PLAYERS;audience=caster} @self
    ];
    oh=[
      - setVar{k=skill.damage;a="<skill.var.damageStepAvoid|0> + 30";t=FLOAT} @self
      - damage{a="<skill.var.damage>";pi=true;ii=true}
      - sound{s=entity.zombie.attack_wooden_door;sc=PLAYERS;audience=caster}
    ];
    conditions=[
      - isLiving true
    ]} @EIR{r=24;limit=5;sort=RANDOM}

