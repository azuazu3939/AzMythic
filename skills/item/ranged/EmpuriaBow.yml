Azuriter_Item_Ranged_EmpuriaBow_Use:
  Conditions:
  - wearing{s=HAND;i=Azuriter_エンピュリアボウ}
  - hasMana{m=>20;
    onFail=[
      - message{m="&cマナが足りません。"} @self
    ]}
  - matCooldown{m=BOW} false
  Skills:
  - setVar{k=caster.Azuriter_Item_Var_RangedShotCounter;a="max(60 - <az.attack_speed.double> * 8, 8)";t=INTEGER} @self
  - setMaterialCooldown{m=BOW;d="<caster.var.Azuriter_Item_Var_RangedShotCounter|60>"} @self

  - modifyMana{a=20;m=consume} @self
  - setVar{k=caster.Azuriter_Item_Var_EmpuriaBowCharge;a="<caster.var.Azuriter_Item_Var_EmpuriaBowCharge|0>";t=INTEGER} @self
  - skill{
    s=[
      - setVar{k=caster.Azuriter_Item_Var_EmpuriaBowCharge;a="0";t=INTEGER} @self
      - skill{s=Azuriter_Item_Ranged_EmpuriaBow_BurstAura} @self
      - sound{s=entity.player.levelup;p=0;audience=caster} @self

    ]} @self ?varrange{k=caster.Azuriter_Item_Var_EmpuriaBowCharge;r=>199}
  - delay 2
  - skill{s=Azuriter_Item_Ranged_EmpuriaBow_Shot;so=0} @self
  - skill{s=Azuriter_Item_Ranged_EmpuriaBow_Shot;so=3} @self
  - skill{s=Azuriter_Item_Ranged_EmpuriaBow_Shot;so=-3} @self


Azuriter_Item_Ranged_EmpuriaBow_Shot:
  Skills:
  - projectile{
    os=[
      - sound{s=entity.zombie.infect;v=0.35;p=1;audience=caster;sc=AMBIENT} @self
      - sound{s=entity.breeze.jump;v=0.35;p=2;audience=caster;sc=AMBIENT} @self
      - setVar{k=caster.Azuriter_Item_Var_EmpuriaBowCharge;a="<caster.var.Azuriter_Item_Var_EmpuriaBowCharge|0> + 1";t=INTEGER} @self
    ];
    ot=[
      - e:p{p=end_rod;a=1;audience=caster} @origin 0.25
      - modifyprojectile{t=VELOCITY;a=MULTIPLY;v=1.05} @self
    ];
    oh=[
      - setVar{k=caster.Azuriter_Item_Var_EmpuriaBowCharge;a="<caster.var.Azuriter_Item_Var_EmpuriaBowCharge|0> + 8";t=INTEGER} @self
      - setVar{k=caster.Azuriter_Item_Var_EmpuriaBowCharge;a="<caster.var.Azuriter_Item_Var_EmpuriaBowCharge|0> + 12";t=INTEGER} @self 0.15
      - damage{a="<caster.damage>";pi=true;ii=true;dc=PROJECTILE}
      - e:p{p=crit_magic;a=10;vs=0.5;hs=0.5;audience=caster}
      - skill{s=Azuriter_Item_Ranged_EmpuriaBow_BurstRelay}
    ];
    c=[
      - isliving true
    ];
    v=25;vr=2.25;hr=2.25;hp=false;hnp=true;i=1;mr=36;b=ARROW;se=false;sso=<skill.so>;sfo=2.5;pitch=0;tyo=8;g=0.8} @forward{f=30;lockpitch=true}

Azuriter_Item_Ranged_EmpuriaBow_BurstRelay:
  Cooldown: 0.2
  Conditions:
  - hasAura{n=Azuriter_Item_Aura_EmpuriaBowBurst} true
  - hasTag{t=Azuriter_Item_Tag_EmpuriaBowBurstRunning} true
  Skills:
  - auraRemove{n=Azuriter_Item_Aura_EmpuriaBowBurst;s=1} @self
  - sudo{
    s=[
      - skill{
        s=[
          - projectile{v=0.01;vr=2;hr=2;hp=false;hnp=true;hitself=true;i=1;mr=20;syo=15;sso="<random.-10to10>";sfo="<random.-10to10>";b=ARROW;g=12;
            oh=[
              - sudo{s=Azuriter_Item_Ranged_EmpuriaBow_BurstHit;cat=true} @trigger
            ]} @self
        ];repeat=25;repeati=0} @self
    ];cat=true}
  - delay 4
  - skill{s=Azuriter_Item_Ranged_EmpuriaBow_BurstRelay}

Azuriter_Item_Ranged_EmpuriaBow_BurstHit:
  Skills:
  - modifyMana{a=10;m=give} @self
  - damage{a="<caster.damage> + 100";pi=true;ii=true;e=BLUE;dc=PROJECTILE} @trigger


Azuriter_Item_Ranged_EmpuriaBow_BurstReady:
  Cooldown: 1
  Conditions:
  - hasAura{n=Azuriter_Item_Aura_EmpuriaBowBurst} true
  - hasTag{t=Azuriter_Item_Tag_EmpuriaBowBurstRunning} false
  Skills:
  - message{m="エンピュリアボウバースト実行可能"} @self
  - addtag{t=Azuriter_Item_Tag_EmpuriaBowBurstRunning} @self

Azuriter_Item_Ranged_EmpuriaBow_BurstAura:
  Skills:
  - aura{n=Azuriter_Item_Aura_EmpuriaBowBurst;ms=5;rd=true;t=1200;
    oe=[
      - removeTag{t=Azuriter_Item_Tag_EmpuriaBowBurstRunning} @self
      - message{m="エンピュリアボウバースト終了"} @self
      - setMaterialCooldown{m=BOW;cd=3} @self
    ]} @self