Azuriter_Item_Ranged_FireBulletBow_Use:
  Conditions:
  - wearing{s=HAND;i=Azuriter_ファイアバレットボウ}
  - hasMana{m=>20;
    onFail=[
      - message{m="&cマナが足りません。"} @self
    ]}
  - matCooldown{m=BOW} false
  Skills:
  - setVar{k=caster.Azuriter_Item_Var_RangedShotCounter;a="max(60 - <az.attack_speed.double> * 8, 8)";t=INTEGER} @self
  - setMaterialCooldown{m=BOW;d="<caster.var.Azuriter_Item_Var_RangedShotCounter|60>"} @self

  - modifyMana{a=20;m=consume} @self
  - setVar{k=skill.damage;a="<caster.damage> * 0.85";t=FLOAT} @self
  - setVar{k=caster.Azuriter_Item_Var_RangedShotCounter;a="<caster.var.Azuriter_Item_Var_RangedShotCounter|0> + 1";t=INTEGER} @self
  - setVar{k=skill.damage;a="<skill.var.damage> * 0.995";t=FLOAT;repeat=<caster.var.Azuriter_Item_Var_RangedShotCounter|0>;repeati=0} @self
  - delay 2
  - skill{s=Azuriter_Item_Ranged_FireBulletBow_Shot;ho=0} @self
  - skill{s=Azuriter_Item_Ranged_FireBulletBow_Shot;ho=45} @self
  - skill{s=Azuriter_Item_Ranged_FireBulletBow_Shot;ho=-45} @self
  - delay 250
  - setVar{k=caster.Azuriter_Item_Var_RangedShotCounter;a="<caster.var.Azuriter_Item_Var_RangedShotCounter|0> - 1";t=INTEGER} @self
  - setVar{k=caster.Azuriter_Item_Var_RangedShotCounter;a="0";t=INTEGER} @self ?varrange{k=caster.Azuriter_Item_Var_RangedShotCounter;r=<0}


Azuriter_Item_Ranged_FireBulletBow_Shot:
  Skills:
  - missile{
    os=[
      - setVar{k=caster.Azuriter_Item_Var_FireBulletBowBurstStock;a="0";t=INTEGER} @self ?!varisset{k=caster.Azuriter_Item_Var_FireBulletBowBurstStock}
      - sound{s=entity.zombie.infect;v=0.35;p=1;audience=caster;sc=AMBIENT} @self
      - sound{s=entity.breeze.jump;v=0.35;p=2;audience=caster;sc=AMBIENT} @self
    ];
    ot=[
      - modifyprojectile{t=INERTIA;a=MULTIPLY;v=0.95} @self
      - e:p{p=flame;a=1;audience=caster} @origin 0.35
      - modifyprojectile{t=VELOCITY;a=MULTIPLY;v=1.05} @self
    ];
    oh=[
      - modifyMana{a=5;m=give} @self
      - damage{a=<skill.var.damage>;pi=true;ii=true;e=RED;dc=PROJECTILE}
      - e:p{p=crit_magic;a=10;vs=0.5;hs=0.5;audience=caster}
      - setVar{k=caster.Azuriter_Item_Var_FireBulletBowHitCount;a="<caster.var.Azuriter_Item_Var_FireBulletBowHitCount|0> + 1";t=INTEGER} @self
      - skill{s=Azuriter_Item_Ranged_FireBulletBow_ShotCharge} @self
      - skill{s=Azuriter_Item_Ranged_FireBulletBow_ShotExplode}
    ];
    c=[
      - isliving true
    ];
    v=18;in=16;vr=2.5;hr=2.5;hp=false;hnp=true;i=1;b=ARROW;se=false;vo=0.15;mr=36;ho=<skill.ho>;sfo=3} @forward{f=30;lockpitch=true}

Azuriter_Item_Ranged_FireBulletBow_ShotCharge:
  Conditions:
  - varrange{k=caster.Azuriter_Item_Var_FireBulletBowHitCount;r=>49} true
  Skills:
  - setVar{k=caster.Azuriter_Item_Var_FireBulletBowHitCount;a="0";t=INTEGER} @self
  - setVar{k=caster.Azuriter_Item_Var_FireBulletBowBurstStock;a="<caster.var.Azuriter_Item_Var_FireBulletBowBurstStock|0> + <random.3to5>";t=INTEGER} @self
  - setVar{k=caster.Azuriter_Item_Var_FireBulletBowBurstStock;a="10";t=INTEGER} @self ?varrange{k=caster.Azuriter_Item_Var_FireBulletBowBurstStock;r=>10}

Azuriter_Item_Ranged_FireBulletBow_ShotExplode:
  Cooldown: 1
  Conditions:
  - varrange{k=caster.Azuriter_Item_Var_FireBulletBowBurstStock;r=>0}
  Skills:
  - setVar{k=caster.Azuriter_Item_Var_FireBulletBowBurstStock;a="<caster.var.Azuriter_Item_Var_FireBulletBowBurstStock> - 1";t=INTEGER} @self
  - sound{s=entity.allay.item_given;audience=caster;p=2;sc=AMBIENT;audience=caster} @self
  - sound{s=block.trial_spawner.about_to_spawn_item;p=2;v=0.75;sc=AMBIENT;audience=caster} @self
  - delay 5
  - projectile{
    ot=[
      - e:p{p=explosion;a=1;audience=caster} @origin
      - e:p{p=flame;a=4;ys=0.5;hs=0.5;s=0.75;audience=caster} @origin
    ];
    oh=[
      - damage{a="<caster.damage> * 0.5";pi=true;ii=true;e=RED;dc=PROJECTILE}
      - modifyMana{a=15;m=give} @self
    ];
    c=[
      - isliving true
    ];
    os=[
      - sound{s=item.trident.hit_ground;v=0.15;p=1;audience=caster;sc=AMBIENT} @origin
      - sound{s=entity.puffer_fish.blow_out;v=0.15;p=0.5;audience=caster;sc=AMBIENT} @origin
      - sound{s=entity.generic.extinguish_fire;v=0.01;p=2;audience=caster;sc=AMBIENT;delay=3} @origin
      - sound{s=entity.generic.explode;v=0.075;p=2;audience=caster;sc=AMBIENT;delay=3} @origin
      - sound{s=entity.zombie.infect;v=0.15;p=2;audience=caster;sc=AMBIENT;delay=3} @origin
      - e:p{p=cloud;audience=caster;a=5;ys=1;hs=2;s=1.25} @origin
    ];
    v=16;i=8;vr=2;hr=3;se=false;hp=false;hnp=true;sfo=2;mr=12;origin=@targeted;fo=true;tyo=1} @ringAroundOrigin{r=16;p=16}