  - setVar{k=skill.chance;a="<random.1to2>";t=INTEGER} @self
  - skill{s=Azuriter_Core_Player_Slash_Process;roll=135;damage=120;effect=Azuriter_Item_Melee_Endiam_L1_Effect} ?varrange{k=skill.chance;r="1"}
