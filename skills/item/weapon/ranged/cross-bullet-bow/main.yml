Azuriter_Item_Weapon_CrossBulletBow_Use:
  Conditions:
  - wearing{s=HAND;i=Azuriter_クロスバレットボウ} true
  - matCooldown{m=CROSSBOW} false
  Skills:
  - setVar{k=skill.Azuriter_Item_Var_RangedShot;a="1 / ((<az.attack_speed.double> - 4) * 0.1 + 1) * 160";t=INTEGER} @self
  - setMaterialCooldown{m=CROSSBOW;d="<skill.var.Azuriter_Item_Var_RangedShot>"} @self
  - setVar{k=skill.run;t=METASKILL;
    a=[ 
      - sound{s=entity.firework_rocket.shoot;v=0.35;audience=caster;sc=PLAYERS} @self
     ]} @self
  - skill{s=Azuriter_Item_Weapon_CrossBulletBow_Process;repeat=5;repeati=3}

Azuriter_Item_Weapon_CrossBulletBow_Full:
  Conditions:
  - wearing{s=HAND;i=Azuriter_クロスバレットボウ} true
  - matCooldown{m=CROSSBOW} false
  Skills:
  - setVar{k=skill.Azuriter_Item_Var_RangedShot;a="1 / ((<az.attack_speed.double> - 4) * 0.1 + 1) * 1200";t=INTEGER} @self
  - setMaterialCooldown{m=CROSSBOW;d="<skill.var.Azuriter_Item_Var_RangedShot>"} @self
  - setMaterialCooldown{m=BOW;d="<skill.var.Azuriter_Item_Var_RangedShot> / 4"} @self
  - setVar{k=skill.run;t=METASKILL;
    a=[ 
      - sound{s=entity.firework_rocket.blast;v=0.35;audience=caster;sc=PLAYERS} @self
     ]} @self
  - skill{s=Azuriter_Item_Weapon_CrossBulletBow_Process;repeat=15;repeati=1}

Azuriter_Item_Weapon_CrossBulletBow_Process:
  Skills:
  - projectile{
    os=[
      - vskill{s=<skill.var.run>} @self
    ];
    ot=[
      - e:p{p=spark;a=1;ys=0.1;hs=0.1;audience=caster;delay=4} @origin
      - e:p{p=explode;size=0.25;a=1;audience=caster} @origin 
    ];
    oh=[
      - damage{a="<caster.damage> + 10";pi=true;ii=true}
    ];
    g=0.5;tyo=1;v=32;i=2;vr=2;r=2;hp=false;hnp=true} @TL{d=24}