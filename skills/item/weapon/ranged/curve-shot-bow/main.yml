# カーブショットボウの発動入口。
Azuriter_Item_Weapon_Ranged_CurveShotBow_Use:
  Conditions:
  - wearing{s=HAND;i=Azuriter_カーブショットボウ}
  - matCooldown{m=BOW} false
  Skills:
  - setVar{k=caster.Azuriter_Item_Var_RangedShot;a="1 / ((<az.attack_speed.double> - 4) * 0.1 + 1) * 16";t=INTEGER} @self
  - setMaterialCooldown{m=BOW;d="<caster.var.Azuriter_Item_Var_RangedShot>"} @self
  - setVar{k=skill.damage;a="<caster.damage> * 0.75";t=FLOAT} @self
  - delay 2
  - skill{s=Azuriter_Item_Weapon_Ranged_CurveShotBow_Shot;repeat=3;repeati=0} @self
  - delay 2
  - skill{s=Azuriter_Item_Weapon_Ranged_CurveShotBow_Shot;repeat=3;repeati=0} @self
  - delay 2
  - skill{s=Azuriter_Item_Weapon_Ranged_CurveShotBow_Shot;repeat=3;repeati=0} @self

# カーブショットボウの弾体処理。
Azuriter_Item_Weapon_Ranged_CurveShotBow_Shot:
  Skills:
  - missile{
    os=[
      - sound{s=entity.arrow.shoot;audience=caster;v=0.3} @self
    ];
    ot=[
      - modifyprojectile{t=INERTIA;a=MULTIPLY;v=0.95;delay=10} @self
      - e:p{p=electric_spark;a=1;ys=0.05;hs=0.05;audience=caster} @origin 0.5
      - modifyprojectile{t=VELOCITY;a=MULTIPLY;v=1.025} @self
    ];
    oh=[
      - damage{a=<skill.var.damage>;pi=true;ii=true;dc=PROJECTILE}
      - e:p{p=crit_magic;a=10;vs=0.5;hs=0.5;audience=caster}
      - sound{s=entity.arrow.hit;audience=caster}
      - sound{s=entity.arrow.hit_player;audience=caster;v=0.75} @self
      - modifyMana{a=3;m=give} @self
    ];
    c=[
      - isliving true
    ];
    v=16;in=16;vr=3;hr=2.5;hp=false;hnp=true;i=1;sdir=@forward{fo=0;rot=<random.-45to45>;lockpitch=true};vo=0.3;mr=36;
    b=ARROW} @forward{f=30;lockpitch=true}
