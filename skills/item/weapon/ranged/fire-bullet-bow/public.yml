# ファイアバレットボウの発動入口。
Azuriter_Item_Weapon_Ranged_FireBulletBow_Use:
  Conditions:
  - wearing{s=HAND;i=Azuriter_ファイアバレットボウ}
  - hasMana{m=>20;
    onFail=[
      - message{m="&cマナが足りません。"} @self
    ]}
  - matCooldown{m=BOW} false
  Skills:
  - setVar{k=skill.Azuriter_Item_Var_RangedShot;a="1 / ((<az.attack_speed.double> - 4) * 0.1 + 1) * 16";t=INTEGER} @self
  - setMaterialCooldown{m=BOW;d="<skill.var.Azuriter_Item_Var_RangedShot>"} @self
  - modifyMana{a=20;m=consume} @self
  - setVar{k=skill.damage;a="<caster.damage> * 0.75";t=FLOAT} @self
  - delay 2
  - skill{s=Azuriter_Item_Weapon_Ranged_FireBulletBow_Shot;ho=0} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_FireBulletBow_Shot;ho=45} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_FireBulletBow_Shot;ho=-45} @self
