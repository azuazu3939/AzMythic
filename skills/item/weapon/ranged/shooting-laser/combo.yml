# シューティングスター最大時の一斉掃射。
Azuriter_Item_Weapon_Ranged_ShootingLaser_Use_5:
  Conditions:
  - matCooldown{m=enchanted_book} false
  - varrange{k=skill.ShootingStar;r=>9} true
  Skills:
  - setVar{k=skill.ShootingStar;t=INTEGER;a="0"} @self
  - setVar{k=skill.Azuriter_Item_Var_RangedShot;a="1 / ((<az.attack_speed.double> - 4) * 0.1 + 1) * 30";t=INTEGER} @self
  - setMaterialCooldown{m=Enchanted_book;d="<skill.var.Azuriter_Item_Var_RangedShot>"} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process1;repeat=5;repeati=<random.5to15>;delay=0;ho=<random.-30to30>} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process2;repeat=5;repeati=<random.5to15>;delay=1;ho=<random.-30to30>} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process3;repeat=5;repeati=<random.5to15>;delay=2;ho=<random.-30to30>} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process4;repeat=5;repeati=<random.5to15>;delay=3;ho=<random.-30to30>} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process7;repeat=5;repeati=10;ho=<random.-30to30>} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process8;repeat=5;repeati=10;ho=<random.-30to30>} @self

# 4段階目の発動回数を蓄積する。
Azuriter_Item_Weapon_Ranged_ShootingLaser_Use_Count:
  Skills:
  - setVar{k=skill.ShootingStar;t=INTEGER;a="<skill.var.ShootingStar|0> + 1"} @self
