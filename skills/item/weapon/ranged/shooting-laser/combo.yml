# シューティングレーザーの1段階目。
Azuriter_Item_Weapon_Ranged_ShootingLaser_Use_1:
  Conditions:
  - hasTag{t=ShootingLaser1} false
  - hasTag{t=ShootingLaser2} false
  - hasTag{t=ShootingLaser3} false
  - matCooldown{m=enchanted_book} false
  - varrange{k=skill.ShootingStar;r=10} false
  Skills:
  - setVar{k=skill.Azuriter_Item_Var_RangedShot;a="1 / ((<az.attack_speed.double> - 4) * 0.1 + 1) * 6";t=INTEGER} @self
  - setMaterialCooldown{m=Enchanted_book;d="<skill.var.Azuriter_Item_Var_RangedShot>"} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process1;ho=0} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process2;ho=0} @self
  - addtag{t=ShootingLaser1} @self

