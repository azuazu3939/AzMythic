Azuriter_Item_Weapon_Ranged_ShootingLaser_Use:
  Cooldown: 1
  Conditions:
  - wearing{s=HAND;i=Azuriter_Weapon_シューティングレーザー} true
  - hasMana{m=>10;
    onFail=[
      - message{m="&cマナが足りません。"} @self
    ]} true 
  - matCooldown{m=enchanted_book} false
  Skills:
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process1} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process2} @self

Azuriter_Item_Weapon_Ranged_ShootingLaser_Process1:
  Skills:
  - projectile{v=24;i=1;vr=2;r=2;se=false;sb=false;syo=2;sfo=2;sso=2.5;d=60;
    os=[
      - setvarloc{var=skill.ShootingLaser1;v=@origin} @self
    ];
    ot=[
      - displayline{material=LIGHT_BLUE_STAINED_GLASS;scale=0.5,0.5;keepalive=5;brightness=15,15;viewrange=64;interpolation=1} @variableLocation{k=skill.ShootingLaser1}
      - displayline{material=LIGHT_BLUE_STAINED_GLASS;scale=0.5,0.5;keepalive=5;brightness=15,15;viewrange=64;fo=true;interpolation=1} @variableLocation{k=skill.ShootingLaser1}
      - e:p{c=#22a4f0;a=8;ys=1;hs=1;audience=caster;s=0.35;size=2} @variableLocation{k=skill.ShootingLaser1}
      - e:p{p=end_rod;a=2;ys=1;hs=1;audience=caster;s=0.35} @variableLocation{k=skill.ShootingLaser1}
    ];
    oh=[
      - damage{a=<skill.var.damage>;pi=true;ii=true;e=PURPLE}
    ]} @TL

