Azuriter_Item_Weapon_Ranged_ShootingLaser_Process1:
  Skills:
  - projectile{v=50;i=1;vr=3;r=3;se=false;sb=false;syo=2;sfo=-5;sso=3;d=20;hp=false;hnp=true;mr=40;
    os=[
      - setvarloc{var=skill.ShootingLaser1;v=@origin} @self
      - sound{s=block.trial_spawner.about_to_spawn_item;p=2;v=0.5;audience=caster;sc=AMBIENT} @self
    ];
    ot=[
      - displayline{material=LIGHT_BLUE_STAINED_GLASS;scale=0.5,0.5;keepalive=5;brightness=15,15;viewrange=64;fo=true;interpolation=1} @variableLocation{k=skill.ShootingLaser1}
      - e:p{c=#37abff;a=3;ys=0.35;hs=0.35;audience=caster;s=0.25} @origin
    ];
    oh=[
      - damage{a=<caster.damage> * 0.5;pi=true;ii=true;e=PURPLE;repeat=3;repeati=5}
      - sound{s=entity.zombie.attack_iron_door;p=2;v=1;audience=caster;sc=AMBIENT;repeat=3;repeati=5}
    ]} @TL{cpitch=0}

