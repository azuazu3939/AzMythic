    os=[
      - setvarloc{var=skill.ShootingLaser1} @self
    ];
    ot=[
      - displayline{material=LIGHT_BLUE_STAINED_GLASS;scale=0.5,0.5;keepalive=5;brightness=15,15;viewrange=64;fo=true;interpolation=0} @variableLocation{k=skill.ShootingLaser1}
      - e:p{c=#22a4f0;a=2;ys=0.85;hs=0.85;audience=caster;s=0.1} @variableLocation{k=skill.ShootingLaser1}
      - e:p{p=end_rod;a=2;ys=0.5;hs=0.5;audience=caster;s=0.15} @variableLocation{k=skill.ShootingLaser1}
    ];
    oh=[
      - damage{a=<skill.var.damage>;pi=true;ii=true;e=PURPLE}
    ];
    c=[
      - isliving true
    ]} @TL

