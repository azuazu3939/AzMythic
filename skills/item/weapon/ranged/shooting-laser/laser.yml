Azuriter_Item_Weapon_Ranged_ShootingLaser_Use:
  Conditions:
  - wearing{s=HAND;i=Azuriter_Weapon_シューティングレーザー} true
  - hasMana{m=>30;
    onFail=[
      - message{m="&cマナが足りません。"} @self
    ]} true 
  - matCooldown{m=enchanted_book} false
  Skills:
  - modifyMana{a=30;m=consume} @self
  - setVar{k=caster.ShootingStar;t=INTEGER;a="0"} @self ?!varset{k=caster.ShootingStar}
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Use_1} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Use_2} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Use_3} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Use_4} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Use_5} @self

