# シューティングレーザーの発動入口。
Azuriter_Item_Weapon_Ranged_ShootingLaser_Use:
  Conditions:
  - wearing{s=HAND;i=Azuriter_Weapon_シューティングレーザー} true
  - hasMana{m=>30;
    onFail=[
      - message{m="&cマナが足りません。"} @self
    ]} true
  - matCooldown{m=enchanted_book} false
  Skills:
  - modifyMana{a=30;m=consume} @self
  - setVar{k=caster.ShootingStar;t=INTEGER;a="0"} @self ?!varset{k=caster.ShootingStar}
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Use_1} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Use_2} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Use_3} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Use_4} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Use_5} @self

# シューティングスター最大時のキル追撃入口。
Azuriter_Item_Weapon_Ranged_ShootingLaser_Kill:
  Conditions:
  - wearing{s=HAND;i=Azuriter_Weapon_シューティングレーザー} true
  - matCooldown{m=enchanted_book} false
  Skills:
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process1;repeat=<random.1to2>;repeati=<random.5to15>;delay=0;ho=<random.-30to30>} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process2;repeat=<random.1to2>;repeati=<random.5to15>;delay=1;ho=<random.-30to30>} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process3;repeat=<random.1to2>;repeati=<random.5to15>;delay=2;ho=<random.-30to30>} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process4;repeat=<random.1to2>;repeati=<random.5to15>;delay=3;ho=<random.-30to30>} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process7;repeat=<random.1to2>;repeati=10;ho=<random.-30to30>} @self
  - skill{s=Azuriter_Item_Weapon_Ranged_ShootingLaser_Process8;repeat=<random.1to2>;repeati=10;ho=<random.-30to30>} @self
