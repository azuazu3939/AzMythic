Azuriter_風上の軌跡_R1_Skills:
  Cooldown: 3
  Conditions:
  - wearing{m=Azuriter_風上の軌跡;s=HAND} true
  - hasMana{m=>50;
    onFail=[
      - message{m="&cマナが足りません。"} @self
    ]}
  - matCooldown{m=WOODEN_SWORD} false
  - hasTag{t=Azuriter_Core_Tag_StepAvoidLock} castinstead Azuriter_Core_StepAvoid_LockFix
  - hasAura{n=Azuriter_Core_Aura_StepAvoidFallCancel} castinstead Azuriter_Core_StepAvoid_FallFix
  Skills:
  - modifyMana{a=50;m=consume} @self
  - setMaterialCooldown{m=WOODEN_SWORD;d=60} @self
  - setVar{k=skill.count;a="0";t=INTEGER} @self
  - addtag{t=Azuriter_Core_Tag_StepAvoidLock} @self
  - ondamaged{t=15;n=Azuriter_Core_Aura_StepAvoid;damagemod="ENTITY_ATTACK 0.05,CUSTOM 0.05";rd=true;
    oh=[
      - skill{s=Azuriter_Core_StepAvoid_Router} @self
    ]} @self

  - removetag{t=Azuriter_Core_Tag_StepAvoidLock;delay=15} @self
  - projectile{
    ot=[
      - setVar{k=skill.count;a="<skill.var.count> + 1";t=INTEGER} @self
      - lunge{v=1.2;vy="(-0.125 * <skill.var.count>) + 0.5"} @self
      - ondamaged{n=Azuriter_Core_Aura_StepAvoidFallCancel;t=2;damagemod="FALL 0"} @self
    ];
    os=[
      - lunge{v=3.5;vy=0.25} @self
      - setVar{k=skill.damageStepAvoid;a="<caster.damage>";t=FLOAT} @self
      - sound{s=entity.wither.shoot;sc=PLAYERS;audience=caster} @self
    ];
    oe=[
      - removeaura{n=Azuriter_Core_Aura_StepAvoidFallCancel;delay=2} @self
    ];
    i=2;hp=false;hnp=false;sb=false;se=false;tyo=2;g=1;mr=12;vr=1;hr=1;v=1;d=40} @forward{lockpitch=true} ?!crouching
