Azuriter_DayMaterial_Day:
  Cooldown: 1
  Conditions:
  - day
  Skills:
  - glow{t=99999999;i=20;c=DARK_PURPLE} @self
  - aura{n=Azuriter_Mob_Aura_DayMaterialDay;i=10;t=99999999;cod=false;
    ot=[
      - remove @self ?!day
    ]} @self
  - skill{s=Azuriter_DayMaterial_Buff} @self

Azuriter_DayMaterial_Buff:
  Conditions:
  - (hasAura{n=Azuriter_Mob_Aura_DayMaterialNight} || hasAura{n=Azuriter_Mob_Aura_DayMaterialDay})
  Skills:
  - potion{t=SPEED;l=2;d=100;p=false;a=false} @self
  - potion{t=STRENGTH;l=1;d=100;p=false;a=false} @self
  - potion{t=RESISTANCE;l=1;d=100;p=false;a=false} @self

Azuriter_DayMaterial_NoDay:
  Cooldown: 1
  Conditions:
  - day false
  Skills:
  - glow{t=99999999;i=20;color=YELLOW} @self
  - aura{n=Azuriter_Mob_Aura_DayMaterialNight;i=10;t=99999999;cod=false;
    ot=[
      - remove @self ?day
    ]} @self
  - skill{s=Azuriter_DayMaterial_Buff} @self

Azuriter_DayMaterial_Day_Drop:
  Skills:
  - cmd{c="mlg <target.name> Azuriter_黒マテリア 1 1"} @ThreatTablePlayers{c=[ - hasAura{n=Azuriter_Core_Aura_PlayerInCombat} true ]} ?day ?hasAura{n=Azuriter_Mob_Aura_DayMaterialDay}

Azuriter_DayMaterial_NoDay_Drop:
  Skills:
  - cmd{c="mlg <target.name> Azuriter_白マテリア 1 1"} @ThreatTablePlayers{c=[ - hasAura{n=Azuriter_Core_Aura_PlayerInCombat} true ]} ?!day ?hasAura{n=Azuriter_Mob_Aura_DayMaterialNight}