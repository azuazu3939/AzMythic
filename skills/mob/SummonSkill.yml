Azuriter_Neutral_Zombie_Summon:
  Cooldown: 1
  Skills:
  - skill{s=Azuriter_Summon_トライアル_1} @self

Azuriter_Big_Zombie_Summon:
  Cooldown: 1
  Skills:
  - skill{s=Azuriter_Summon_トライアル_2} @self

Azuriter_Elite_Zombie_Summon:
