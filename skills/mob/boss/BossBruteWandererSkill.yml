Azuriter_Brute_Wanderer_Skill_2:
  Cooldown: 10
  Skills:
  - sound{s=entity.hoglin.death;p=2;v=2;sc=PLAYERS} @self
  - e:p{p=angry_villager;a=32;ys=2;hs=3;audience=@PIR{r=32};vd=32;s=1.25} @self
  - delay 15
  - projectile{v=24;g=2.5;i=1;r=2.5;vr=3.25;vo=0.75;sfo=0;syo=1.5;mr=32;d=120;
    ot=[
      - endprojectile ?distanceFromTL{d=>32}
      - modifyprojectile{t=VELOCITY;a=MULTIPLY;v=1.1} @self
      - teleport @origin 
      - delay 4
      - e:p{p=explosion;a=1;cd=0.25} @origin 
    ];
    oh=[
      - damage{a="<caster.damage> * 1";pi=true;ii=true}
      - projectilevelocity{m=MULTIPLY;r=true;x=-180;z=-180} @self
      - endprojectile{delay=8} @self
    ];
    oe=[
      - e:p{p=explosion_huge;a=1} @origin 
      - sound{s=entity.generic.explode;v=2;p=0;sc=PLAYERS} @origin 
      - setVar{k=skill.loc;a="<caster.l.x.double>,<caster.l.y.double>,<caster.l.z.double>";t=STRING} @self
      - addmask{r=10;h=25;material=RED_TERRACOTTA;d=20} @origin
      - delay 20
      - damage{a="<caster.damage> * 1";pi=true;ii=true} @ARadius{r=10;h=25;loc=<skill.var.loc>}
      - sound{s=entity.generic.explode;v=0.75;sc=PLAYERS} @origin
    ]} @TL

