OpenField_Enemy_幻想獣バサモス_MCLove32_ATTACK_1:
  Cooldown: 12
  Conditions:
  - incombat true
  - hasTag{t=Azuriter_Core_Tag_EnemyDown} false
  Skills:
  - setVar{var=skill.dmg;val="(<caster.damage> + 1) / 3 * 2";t=FLOAT} @self
  - skill:Azuriter_Core_Enemy_DamageBuff @self
  - setVar{k=caster.Azuriter_Mob_Var_BasamosAttack1YawOffset;a="0";t=INTEGER} @self
  - meta{s=OpenField_Enemy_幻想獣バサモス_MCLove32_ATTACK_1_Run;repeat=9;repeati=5} @self

OpenField_Enemy_幻想獣バサモス_MCLove32_ATTACK_1_Run:
  Skills:
  - skill{s=OpenField_Enemy_幻想獣バサモス_MCLove32_ATTACK_1_Process1;f=true} @forward{lockpitch=true;y=2}
  - skill{s=OpenField_Enemy_幻想獣バサモス_MCLove32_ATTACK_1_Process2;f=true} @forward{lockpitch=true;y=2}
  - skill{s=OpenField_Enemy_幻想獣バサモス_MCLove32_ATTACK_1_Process3;f=true} @forward{lockpitch=true;y=2}
  - setVar{k=caster.Azuriter_Mob_Var_BasamosAttack1YawOffset;a="<caster.var.Azuriter_Mob_Var_BasamosAttack1YawOffset> + 20";t=INTEGER} @self

OpenField_Enemy_幻想獣バサモス_MCLove32_ATTACK_1_Process1:
  Skills:
  - projectile{
    ot=[
      - e:p{p=cloud;a=1;ys=1;hs=0.25;vd=32;audience=@PNO{r=32}} @origin
      - modifyprojectile{t=VELOCITY;a=MULTIPLY;v=1.025} @self
      - setVar{var=skill.dmg;val="<skill.var.dmg> * 1.005";t=FLOAT} @self
    ];
    oh=[
      - damage{a="<skill.var.dmg>";pi=true;ii=true}
    ];
    oe=[
      - e:p{p=explosion_emitter;a=1;size=0.5;s=1;ys=1;hs=1;vd=32;audience=@PNO{r=32}} @origin
      - throw{v=2;yv=0.5} @PlayersNearOrigin{r=5}
    ]
    v=5;i=1;d=400;vr=2.5;r=2.5;bk=true;hs=true;hfs=1;huglava=true;mr=48;sb=false;
    b=MOB;mm=Azuriter_バサモスサンド_幻1;bmd=true;
    ho=<caster.var.Azuriter_Mob_Var_BasamosAttack1YawOffset>}

