# バサモス本体の行動ループ。
Azuriter_Mob_Boss_Basamos_Loop:
  Conditions:
  - incombat true
  TargetConditions:
  - hasAura{n=Azuriter_Core_Aura_NoCombat} false
  - isplayer true
  Skills:
  - addtag{t=Azuriter_Mob_Tag_BasamosCharge} ?!night
  - removetag{t=Azuriter_Mob_Tag_BasamosCharge} ?night
  - randomskill{s=
    Azuriter_Mob_Boss_Basamos_Attack1,
    Azuriter_Mob_Boss_Basamos_Attack2,
    Azuriter_Mob_Boss_Basamos_Attack3,
    Azuriter_Mob_Boss_Basamos_Attack4,
    Azuriter_Mob_Boss_Basamos_Attack5;
    fbs=Azuriter_Mob_Boss_Basamos_Attack1;
    repeat=1;repeati=100} @self
  - delay <random.180to260>
  - skill{s=Azuriter_Mob_Boss_Basamos_Loop} @T
