  - delay 20
  - damage{a="<caster.damage> * 0.75";pi=true;ii=true} @ARing{r=21;t=5;h=25;loc=<skill.var.loc>}
  - sound{s=entity.zombie.break_wooden_door;sc=PLAYERS;p=2;v=2} @varLocation{k=skill.pos}
