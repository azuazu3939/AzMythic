Azuriter_Mob_Boss_BruteWanderer_Attack1:
  Skills:
  - vskill{s=Azuriter_Mob_Boss_BruteWanderer_Attack1_Phase<skill.var.itr>;f=true} @self

Azuriter_Mob_Boss_BruteWanderer_Attack1_Phase1:
  Cooldown: 1
  Conditions:
  - incombat true
  - hasTag{t=Azuriter_Core_Tag_EnemyDown} false
  Skills:
  - setvarloc{k=skill.pos;a=@selfLocation} @self
  - setVar{k=skill.loc;a="<caster.l.x.double>,<caster.l.y.double>,<caster.l.z.double>";t=STRING} @self
  - addmask{r=8;h=25;material=RED_TERRACOTTA;d=20} @varLocation{k=skill.pos}
  - delay 20
  - damage{a="<caster.damage> * 0.75";pi=true;ii=true} @ARadius{r=8;h=25;loc=<skill.var.loc>}
  - sound{s=entity.zombie.break_wooden_door;sc=PLAYERS;p=2;v=2} @varLocation{k=skill.pos}
  - addmask{shape=ring;t=6;r=15;h=25;material=RED_TERRACOTTA;d=20} @varLocation{k=skill.pos}
  - delay 20
  - damage{a="<caster.damage> * 0.75";pi=true;ii=true} @ARing{r=15;t=6;h=25;loc=<skill.var.loc>}
  - sound{s=entity.zombie.break_wooden_door;sc=PLAYERS;p=2;v=2} @varLocation{k=skill.pos}
