Azuriter_Mob_Boss_Feldos_RemoveMarker:
  Skills:
  - removetag{t=Azuriter_Core_Tag_EnemyCycleStart} @self
  - removetag{t=Azuriter_Core_Tag_AttackBusy} @self
  - removetag{t=Azuriter_Core_Tag_EnemyDown} @self
  - removetag{t=Azuriter_Mob_Tag_FeldosAimToggle} @self

# 樹冠の隊長から樹冠の司令官を呼び出す共通呼び出し。
Azuriter_Mob_Boss_Feldos_Commander_Call:
  Skills:
  - signal{s=feldos_commander_call} @self

# 樹冠の前衛長の行動ループ。
Azuriter_Mob_Boss_Feldos_Vanguard_Loop:
  Conditions:
  - incombat true
  TargetConditions:
  - hasAura{n=Azuriter_Core_Aura_NoCombat} false
  - isplayer true
  Skills:
  - randomskill{s=
    Azuriter_Mob_Boss_Feldos_Vanguard_Smash,
    Azuriter_Mob_Boss_Feldos_Vanguard_GroundPulse;
    fbs=Azuriter_Mob_Boss_Feldos_Vanguard_Smash} @self
  - delay <random.110to150>
  - skill{s=Azuriter_Mob_Boss_Feldos_Vanguard_Loop} @T

Azuriter_Mob_Boss_Feldos_Vanguard_Smash:
  Skills:
  - setVar{k=skill.dmg;a="<caster.damage> * 0.9";t=FLOAT} @self
  - meta:Azuriter_Core_Melee_Single_Base @EIC{r=8;a=60;ignore=players;limit=1;sort=NEAREST;p=true;yo=1}

Azuriter_Mob_Boss_Feldos_Vanguard_GroundPulse:
  Skills:
  - setVar{k=skill.dmg;a="<caster.damage> * 1.05";t=FLOAT} @self
  - skill:Azuriter_Core_Boss_GroundPulse @self
