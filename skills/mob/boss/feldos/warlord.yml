# 樹冠の戦団長の行動ループ。
Azuriter_Mob_Boss_Feldos_Warlord_Loop:
  Conditions:
  - incombat true
  TargetConditions:
  - hasAura{n=Azuriter_Core_Aura_NoCombat} false
  - isplayer true
  Skills:
  - randomskill{s=
    Azuriter_Mob_Boss_Feldos_Commander_Smash,
    Azuriter_Mob_Boss_Feldos_Commander_GroundPulse,
    Azuriter_Mob_Boss_Feldos_Commander_Rally;
    fbs=Azuriter_Mob_Boss_Feldos_Commander_Smash} @self
  - delay <random.100to160>
  - skill{s=Azuriter_Mob_Boss_Feldos_Warlord_Loop} @T
