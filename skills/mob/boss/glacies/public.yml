# グラキエス本体の行動ループ。
Azuriter_Mob_Boss_Glacies_Loop:
  Conditions:
  - incombat true
  TargetConditions:
  - hasAura{n=Azuriter_Core_Aura_NoCombat} false
  - isplayer true
  Skills:
  - randomskill{s=
    Azuriter_Mob_Boss_Glacies_Attack1,
    Azuriter_Mob_Boss_Glacies_Attack2,
    Azuriter_Mob_Boss_Glacies_Attack3,
    Azuriter_Mob_Boss_Glacies_Attack4,
    Azuriter_Mob_Boss_Glacies_Attack5;
    fbs=Azuriter_Mob_Boss_Glacies_Attack3;
    repeat=1;repeati=80} @self
  - delay <random.150to220>
  - skill:Azuriter_Mob_Boss_Glacies_Loop @T
