  - cmd{c="mlgo <target.name> Azuriter_Augment_背水のジェム_1 1 0.005"} @self
  - cmd{c="mlgo <target.name> Azuriter_Augment_力のジェム_1 1 0.001"} @self
  - cmd{c="mlgo <target.name> Azuriter_Augment_矢走のジェム_1 1 0.001"} @self
  - cmd{c="mlgo <target.name> Azuriter_Augment_贄のジェム_1 1 0.001"} @self
