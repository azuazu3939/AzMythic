# ソウルワンダラー本体の行動ループ。
Azuriter_Mob_Boss_SoulWanderer_Loop:
  Cooldown: 1
  Conditions:
  - incombat true
  Skills:
  - randomskill{skills=Azuriter_Mob_Boss_SoulWanderer_Attack1 2,Azuriter_Mob_Boss_SoulWanderer_Attack2 3;fbs=Azuriter_Mob_Boss_SoulWanderer_Attack1} @self

  - skill{s=Azuriter_Mob_Boss_SoulWanderer_Attack2} @self
  - delay <random.120to200>
  - skill{s=Azuriter_Mob_Boss_SoulWanderer_Loop} @self
