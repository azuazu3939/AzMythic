  - damage{a="<caster.damage> * 2";pi=true;ii=true;e=RED;dc=FIRE} @ACone{a=60;r=48;h=25;loc=<skill.var.loc>}
  - ignite{d=200} @ACone{a=45;r=32;h=25;loc=<skill.var.loc>;yaw=<skill.var.yaw>;c=[ - hasAura{n=Azuriter_Core_Aura_StepAvoid} false ]}
  - delay  20
  - sound{s=entity.blaze.burn;v=2;sc=PLAYERS} @self
