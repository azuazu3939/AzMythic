Azuriter_Soul_Wanderer_Signal:
  Cooldown: 10
  Conditions:
  - incombat true
  - hasTag{t=Azuriter_Core_Tag_EnemyDown} false
  Skills:
  - skill{s=Azuriter_Soul_Wanderer_Signal_Run} @self
  - delay 60
  - skill{s=Azuriter_Soul_Wanderer_Signal_Run} @self ?healthpercent{p=<0.7}
  - delay 60
  - skill{s=Azuriter_Soul_Wanderer_Signal_Run} @self ?healthpercent{p=<0.35}

Azuriter_Soul_Wanderer_Signal_Run:
