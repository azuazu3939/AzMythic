  - delay 1
  - addmask{shape=cone;r=48;angle=60;h=25;material=RED_TERRACOTTA;d=20} @selfLocation{cpitch=0}
  - setvar{k=skill.loc;val="<caster.l.x.double>,<caster.l.y.double>,<caster.l.z.double>,<caster.l.yaw>";t=STRING} @self
