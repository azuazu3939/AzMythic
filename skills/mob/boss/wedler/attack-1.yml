Azuriter_Mob_Boss_Wedler_Attack1:
  Cooldown: 3
  Conditions:
  - incombat true
  - hasTag{t=Azuriter_Core_Tag_EnemyDown} false
  - hasTag{t=Azuriter_Core_Tag_AttackBusy} false
  - targetWithin{d=16}
  - targetinlineofsight
  Skills:
  - addtag{t=Azuriter_Core_Tag_AttackBusy} @self
  - look{f=true;repeat=79;repeati=1} @T
  - stun{t=180;f=true} @self
  - sound{s=entity.wolf.growl;p=0;v=1.5} @self
  - setVar{var=skill.size;val="1";t=FLOAT} @self
  - skill:Azuriter_Mob_Boss_Wedler_Attack1_Effect{repeat=3;repeati=8} @self
  - delay 35
  - setVar{var=skill.dmg;val="1 + <caster.damage>";t=FLOAT} @self
  - skill:Azuriter_Core_Enemy_DamageBuff @self
  - setVar{var=skill.ho;val="90";t=INTEGER} @self
  - sound{s=entity.wolf.howl;delay=10;v=1.5} @self
  - skill:Azuriter_Mob_Boss_Wedler_Attack1_Process{repeat=44;repeati=1} @self
  - delay 150
  - removeTag{t=Azuriter_Core_Tag_AttackBusy} @self

Azuriter_Mob_Boss_Wedler_Attack1_Effect:
  Skills:
  - e:pr{r=4;pts=32;p=cloud;a=1;s=1;d=true;dir=0,1,0} @selfLocation
  - e:pr{r=8;pts=32;p=cloud;a=1;s=1;d=true;dir=0,1,0} @selfLocation
  - e:pr{r=10;pts=32;p=cloud;a=1;s=1;d=true;dir=0,1,0} @selfLocation

Azuriter_Mob_Boss_Wedler_Attack1_Projectile_Effect:
  Skills:
  - setvar{var=skill.x;val="<random.float.-1to1>";t=FLOAT} @self
  - setvar{var=skill.y;val="<random.float.-1to1>";t=FLOAT} @self
  - setvar{var=skill.z;val="<random.float.-1to1>";t=FLOAT} @self
  - setvar{var=skill.size;val="(50 - <skill.var.delay>) * 0.025 + 0.25";t=FLOAT} @self
  - e:p{p=cloud;a=1;vs=<skill.var.size>;hs=<skill.var.size>;s=0.1;d=true;dr=true;origin=@origin{x=<skill.var.x>;y=<skill.var.y>;z=<skill.var.z>};fo=true} @origin{x=<skill.var.x>;y=<skill.var.y>;z=<skill.var.z>}
  - e:p{p=sweep_attack;a=1;vs=<skill.var.size>;hs=<skill.var.size>;s=0.1;d=true;dr=true;origin=@origin{x=<skill.var.x>;y=<skill.var.y>;z=<skill.var.z>};fo=true} @origin{x=<skill.var.x>;y=<skill.var.y>;z=<skill.var.z>}

