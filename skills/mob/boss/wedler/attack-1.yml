Azuriter_Mob_Boss_Wedler_Attack1_Process_Shoot:
  Skills:
  - setVar{var=skill.ho;val="<skill.var.ho> - 4 * <skill.var.itr>";t=INTEGER} @self
  - projectile{
    ot=[
      - setVar{var=skill.delay;val="<skill.var.delay> - 1";t=INTEGER} @self
      - e:p{p=spark;a=5;vs=0.5;hs=0.25;delay=<skill.var.delay>} @origin
      - look{f=true;delay=<skill.var.delay>} @projectileforward
      - skill:Azuriter_Mob_Boss_Wedler_Attack1_Projectile_Effect{delay=<skill.var.delay>} @origin 0.4
      - skill:Azuriter_Mob_Boss_Wedler_Attack1_Process_Shoot_Damage{delay=<skill.var.delay>} @ENO{r=5;c=[ - samefaction false ];ignore=players}
      - skill:Azuriter_Mob_Boss_Wedler_Attack1_Process_Shoot_Damage{delay=<skill.var.delay>} @PlayersNearOrigin{r=4.5}
    ];
    v=12;se=false;sb=false;mr=40;i=1;sfo=3;syo=3;tyo=3;md=40;ho=<skill.var.ho>;hnp=true;c=[ - samefaction false ]} @forward{lockpitch=true}

Azuriter_Mob_Boss_Wedler_Attack1_Process_Shoot_Damage:
  TargetConditions:
  - hasAura{n=Azuriter_Mob_Aura_WedlerAttack1Hit} false
  Skills:
  - aura{n=Azuriter_Mob_Aura_WedlerAttack1Hit;i=20;t=100}
  - damage{a="<skill.var.dmg> * 2.15";pi=true;ii=true;tag=Azuriter_Core_DamageTag_Attack}
