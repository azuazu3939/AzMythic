Azuriter_DayMaterial_Day:
  Cooldown: 1
  Conditions:
  - night true 
  Skills:
  - glow{t=1200;i=20;color=DARK_PURPLE;buffname=Azuriter_Mob_Aura_DayMaterialDay} @self
  - skill{s=Azuriter_DayMaterial_Buff} @self

Azuriter_DayMaterial_Buff:
  Conditions:
  - (hasAura{n=Azuriter_Mob_Aura_DayMaterialNight} || hasAura{n=Azuriter_Mob_Aura_DayMaterialDay})
  Skills:
  - potion{t=SPEED;l=2;d=100;p=false;a=false} @self
  - potion{t=STRENGTH;l=1;d=100;p=false;a=false} @self
  - potion{t=RESISTANCE;l=1;d=100;p=false;a=false} @self

Azuriter_DayMaterial_NoDay:
  Cooldown: 1
  Conditions:
  - day false
  Skills:
  - glow{t=1200;i=20;color=YELLOW;buffname=Azuriter_Mob_Aura_DayMaterialNight} @self
  - skill{s=Azuriter_DayMaterial_Buff} @self

Azuriter_DayMaterial_Day_Drop:
  Skills:
  - cmd{c="mlg <target.name> Azuriter_黒マテリア 1 1"} @ThreatTablePlayers ?hasAura{n=Azuriter_Mob_Aura_DayMaterialDay}

Azuriter_DayMaterial_NoDay_Drop:
  Skills:
  - cmd{c="mlg <target.name> Azuriter_白マテリア 1 1"} @ThreatTablePlayers ?hasAura{n=Azuriter_Mob_Aura_DayMaterialNight}