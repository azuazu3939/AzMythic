# レットザレーターの射撃処理。
Azuriter_Mob_Common_Letthelater_Shot:
  Cooldown: 5
  Skills:
  - setVar{k=skill.time;a="24";t=INTEGER} @self
  - stun{f=false;t=100}
  - projectile{
    ot=[
      - setVar{k=skill.time;a="<skill.var.time> - 1";t=INTEGER} @self
      - delay <skill.var.time>
      - addMask{b=RED_TERRACOTTA;d=20;r=2.5} @origin
      - setvar{k=skill.loc;val="<caster.l.x.double>,<caster.l.y.double>,<caster.l.z.double>";t=STRING} @self
      - delay 20
      - damage{a="<caster.damage> + 4";pi=true;ii=true} @ARadius{r=2.5;h=25;loc=<skill.var.loc>}
      - sound{s=item.trident.riptide_1;p=2;sc=PLAYERS;v=0.25;delay=78} @origin
    ];
    v=24;i=1;hp=false;se=false;mr=16;d=20;tyo=1} @forward{lockpitch=true}
