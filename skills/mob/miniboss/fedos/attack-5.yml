Azuriter_Mob_Fedos_Attack5:
  Cooldown: 3
  Conditions:
  - incombat true
  - hasTag{t=Azuriter_Core_Tag_AttackBusy} false
  Skills:
  - addtag{t=Azuriter_Core_Tag_AttackBusy} @self
  - setVar{var=skill.dmg;val="<caster.damage> + 1";t=FLOAT} @self
  - potion{t=SLOWNESS;l=7;d=10;p=false} @self
  - sound{s=entity.ender_dragon.flap;v=2} @self
  - sound{s=entity.breeze.idle_air;p=0;v=2} @self
  - delay 10
  - jump{v=1.25} @self
  - delay 2
  - wait{c=[ - onground true ];tt=300} @self
  - skill{s=Azuriter_Mob_Fedos_Attack5_OnGround} @self
  - delay 5
  - removetag{t=Azuriter_Core_Tag_AttackBusy} @self

Azuriter_Mob_Fedos_Attack5_OnGround:
  Conditions:
  - incombat true
  Skills:
  - damage{a="<skill.var.dmg> * 2";pi=true;ii=true;e=RED;tag=Azuriter_Core_DamageTag_Attack} @PRING{min="<skill.var.itr>";max="<skill.var.itr> + 4";c=[ - hasAura{n=Azuriter_Mob_Aura_FedosAttack5GroundHit} false - surface{r=<5} true ]}
  - aura{n=Azuriter_Mob_Aura_FedosAttack5GroundHit;t=40} @PRING{min="<skill.var.itr>";max="<skill.var.itr> + 4"}
  - e:p{p=explosion;a=1;size=1.5} @ring{r="<skill.var.itr> + 2";p=28}
  - e:p{p=block_crack;material=DIRT;a=4;ys=2;hs=1} @ring{r="<skill.var.itr> + 2";p=28}